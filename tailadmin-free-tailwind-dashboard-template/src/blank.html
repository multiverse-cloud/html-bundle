<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ===== Primary Meta ===== -->
    <title>Blank Page | TailAdmin – Tailwind CSS Admin Dashboard Template</title>
    <meta name="description" content="Starter blank page template with TailAdmin layout scaffold – use as a base for building new admin dashboard pages with Tailwind CSS." />
    <meta name="keywords" content="blank page, starter template, tailwind css admin, page scaffold, tailadmin" />
    <meta name="author" content="TailAdmin" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#465fff" />
    <link rel="canonical" href="https://tailadmin.com/blank-page.html" />

    <!-- ===== Open Graph / Facebook ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tailadmin.com/blank-page.html" />
    <meta property="og:site_name" content="TailAdmin" />
    <meta property="og:title" content="Blank Page | TailAdmin – Tailwind CSS Admin Dashboard Template" />
    <meta property="og:description" content="Starter blank page template with TailAdmin layout scaffold – use as a base for building new admin dashboard pages with Tailwind CSS." />
    <meta property="og:image" content="https://tailadmin.com/images/og/tailadmin-og.png" />
    <meta property="og:image:alt" content="Blank Page Template" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ===== Twitter / X Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TailAdmin" />
    <meta name="twitter:creator" content="@TailAdmin" />
    <meta name="twitter:title" content="Blank Page | TailAdmin – Tailwind CSS Admin Dashboard Template" />
    <meta name="twitter:description" content="Starter blank page template with TailAdmin layout scaffold – use as a base for building new admin dashboard pages with Tailwind CSS." />
    <meta name="twitter:image" content="https://tailadmin.com/images/og/tailadmin-og.png" />
    <meta name="twitter:image:alt" content="Blank Page Template" />

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/favicon.ico" />
    <link rel="shortcut icon" href="./images/favicon.ico" />

    <!-- ===== Performance: Preconnect & DNS Prefetch ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- ===== Schema.org Structured Data ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Blank Page | TailAdmin – Tailwind CSS Admin Dashboard Template",
      "description": "Starter blank page template with TailAdmin layout scaffold – use as a base for building new admin dashboard pages with Tailwind CSS.",
      "url": "https://tailadmin.com/blank-page.html",
      "publisher": {
        "@type": "Organization",
        "name": "TailAdmin",
        "url": "https://tailadmin.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://tailadmin.com/images/logo/logo.svg"
        }
      }
    }
    </script>
  </head>
  <body
    x-data="{ page: 'blank', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `Blank Page`}">
              <include src="./partials/breadcrumb.html" />
            </div>
            <!-- Breadcrumb End -->

            <div
              class="min-h-screen rounded-2xl border border-gray-200 bg-white px-5 py-7 dark:border-gray-800 dark:bg-white/[0.03] xl:px-10 xl:py-12"
            >
              <div class="mx-auto w-full max-w-[630px] text-center">
                <h3
                  class="mb-4 text-theme-xl font-semibold text-gray-800 dark:text-white/90 sm:text-2xl"
                >
                  Card Title Here
                </h3>

                <p
                  class="text-sm text-gray-500 dark:text-gray-400 sm:text-base"
                >
                  Start putting content on grids or panels, you can also use
                  different combinations of grids. Please check out the
                  dashboard and other pages
                </p>
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
  </body>
</html>
