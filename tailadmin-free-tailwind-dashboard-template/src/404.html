<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ===== Primary Meta ===== -->
    <title>404 – Page Not Found | TailAdmin – Tailwind CSS Admin Dashboard Template</title>
    <meta name="description" content="The page you are looking for does not exist. Return to the TailAdmin dashboard home." />
    <meta name="keywords" content="404 error page, page not found, tailadmin, tailwind css" />
    <meta name="author" content="TailAdmin" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#465fff" />
    <link rel="canonical" href="https://tailadmin.com/404.html" />

    <!-- ===== Open Graph / Facebook ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tailadmin.com/404.html" />
    <meta property="og:site_name" content="TailAdmin" />
    <meta property="og:title" content="404 – Page Not Found | TailAdmin – Tailwind CSS Admin Dashboard Template" />
    <meta property="og:description" content="The page you are looking for does not exist. Return to the TailAdmin dashboard home." />
    <meta property="og:image" content="https://tailadmin.com/images/og/tailadmin-og.png" />
    <meta property="og:image:alt" content="404 Error Page" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ===== Twitter / X Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TailAdmin" />
    <meta name="twitter:creator" content="@TailAdmin" />
    <meta name="twitter:title" content="404 – Page Not Found | TailAdmin – Tailwind CSS Admin Dashboard Template" />
    <meta name="twitter:description" content="The page you are looking for does not exist. Return to the TailAdmin dashboard home." />
    <meta name="twitter:image" content="https://tailadmin.com/images/og/tailadmin-og.png" />
    <meta name="twitter:image:alt" content="404 Error Page" />

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/favicon.ico" />
    <link rel="shortcut icon" href="./images/favicon.ico" />

    <!-- ===== Performance: Preconnect & DNS Prefetch ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- ===== Schema.org Structured Data ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "404 – Page Not Found | TailAdmin – Tailwind CSS Admin Dashboard Template",
      "description": "The page you are looking for does not exist. Return to the TailAdmin dashboard home.",
      "url": "https://tailadmin.com/404.html",
      "publisher": {
        "@type": "Organization",
        "name": "TailAdmin",
        "url": "https://tailadmin.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://tailadmin.com/images/logo/logo.svg"
        }
      }
    }
    </script>
  </head>
  <body
    x-data="{ page: 'page404', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div
      class="relative z-1 flex min-h-screen flex-col items-center justify-center overflow-hidden p-6"
    >
      <!-- ===== Common Grid Shape Start ===== -->
      <include src="./partials/common-grid-shape.html"></include>
      <!-- ===== Common Grid Shape End ===== -->

      <!-- Centered Content -->
      <div class="mx-auto w-full max-w-[242px] text-center sm:max-w-[472px]">
        <h1
          class="mb-8 text-title-md font-bold text-gray-800 dark:text-white/90 xl:text-title-2xl"
        >
          ERROR
        </h1>

        <img src="./images/error/404.svg" alt="404" class="dark:hidden" />
        <img
          src="./images/error/404-dark.svg"
          alt="404"
          class="hidden dark:block"
        />

        <p
          class="mb-6 mt-10 text-base text-gray-700 dark:text-gray-400 sm:text-lg"
        >
          We can’t seem to find the page you are looking for!
        </p>

        <a
          href="index.html"
          class="inline-flex items-center justify-center rounded-lg border border-gray-300 bg-white px-5 py-3.5 text-sm font-medium text-gray-700 shadow-theme-xs hover:bg-gray-50 hover:text-gray-800 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200"
        >
          Back to Home Page
        </a>
      </div>
      <!-- Footer -->
      <p
        class="absolute bottom-6 left-1/2 -translate-x-1/2 text-center text-sm text-gray-500 dark:text-gray-400"
      >
        &copy; <span id="year"></span> - TailAdmin
      </p>
    </div>

    <!-- ===== Page Wrapper End ===== -->
  </body>
</html>
