<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ===== Primary Meta ===== -->
    <title>eCommerce Dashboard | TailAdmin – Tailwind CSS Admin Dashboard Template</title>
    <meta name="description" content="TailAdmin eCommerce dashboard – real-time KPI cards, revenue charts, order tables, customer map and product analytics built with Tailwind CSS." />
    <meta name="keywords" content="ecommerce dashboard, tailwind css admin, kpi cards, revenue chart, order management, tailadmin" />
    <meta name="author" content="TailAdmin" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#465fff" />
    <link rel="canonical" href="https://tailadmin.com/ecommerce-dashboard.html" />

    <!-- ===== Open Graph / Facebook ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tailadmin.com/ecommerce-dashboard.html" />
    <meta property="og:site_name" content="TailAdmin" />
    <meta property="og:title" content="eCommerce Dashboard | TailAdmin – Tailwind CSS Admin Dashboard Template" />
    <meta property="og:description" content="TailAdmin eCommerce dashboard – real-time KPI cards, revenue charts, order tables, customer map and product analytics built with Tailwind CSS." />
    <meta property="og:image" content="https://tailadmin.com/images/og/tailadmin-og.png" />
    <meta property="og:image:alt" content="eCommerce Dashboard Overview" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ===== Twitter / X Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TailAdmin" />
    <meta name="twitter:creator" content="@TailAdmin" />
    <meta name="twitter:title" content="eCommerce Dashboard | TailAdmin – Tailwind CSS Admin Dashboard Template" />
    <meta name="twitter:description" content="TailAdmin eCommerce dashboard – real-time KPI cards, revenue charts, order tables, customer map and product analytics built with Tailwind CSS." />
    <meta name="twitter:image" content="https://tailadmin.com/images/og/tailadmin-og.png" />
    <meta name="twitter:image:alt" content="eCommerce Dashboard Overview" />

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/favicon.ico" />
    <link rel="shortcut icon" href="./images/favicon.ico" />

    <!-- ===== Performance: Preconnect & DNS Prefetch ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- ===== Schema.org Structured Data ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "eCommerce Dashboard | TailAdmin – Tailwind CSS Admin Dashboard Template",
      "description": "TailAdmin eCommerce dashboard – real-time KPI cards, revenue charts, order tables, customer map and product analytics built with Tailwind CSS.",
      "url": "https://tailadmin.com/ecommerce-dashboard.html",
      "publisher": {
        "@type": "Organization",
        "name": "TailAdmin",
        "url": "https://tailadmin.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://tailadmin.com/images/logo/logo.svg"
        }
      }
    }
    </script>
  </head>
  <body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <div class="grid grid-cols-12 gap-4 md:gap-6">
              <div class="col-span-12 space-y-6 xl:col-span-7">
                <!-- Metric Group One -->
                <include src="./partials/metric-group/metric-group-01.html" />
                <!-- Metric Group One -->

                <!-- ====== Chart One Start -->
                <include src="./partials/chart/chart-01.html" />
                <!-- ====== Chart One End -->
              </div>
              <div class="col-span-12 xl:col-span-5">
                <!-- ====== Chart Two Start -->
                <include src="./partials/chart/chart-02.html" />
                <!-- ====== Chart Two End -->
              </div>

              <div class="col-span-12">
                <!-- ====== Chart Three Start -->
                <include src="./partials/chart/chart-03.html" />
                <!-- ====== Chart Three End -->
              </div>

              <div class="col-span-12 xl:col-span-5">
                <!-- ====== Map One Start -->
                <include src="./partials/map-01.html" />
                <!-- ====== Map One End -->
              </div>

              <div class="col-span-12 xl:col-span-7">
                <!-- ====== Table One Start -->
                <include src="./partials/table/table-01.html" />
                <!-- ====== Table One End -->
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
  </body>
</html>
