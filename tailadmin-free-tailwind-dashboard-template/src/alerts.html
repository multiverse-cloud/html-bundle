<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ===== Primary Meta ===== -->
    <title>Alerts & Notifications | TailAdmin – Tailwind CSS Admin Dashboard Template</title>
    <meta name="description" content="Production-ready alert and notification components for Tailwind CSS dashboards – success, warning, error and info variants with dismiss support." />
    <meta name="keywords" content="alert components, notification ui, tailwind alerts, success warning error info, tailadmin ui" />
    <meta name="author" content="TailAdmin" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#465fff" />
    <link rel="canonical" href="https://tailadmin.com/ui-alerts.html" />

    <!-- ===== Open Graph / Facebook ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tailadmin.com/ui-alerts.html" />
    <meta property="og:site_name" content="TailAdmin" />
    <meta property="og:title" content="Alerts & Notifications | TailAdmin – Tailwind CSS Admin Dashboard Template" />
    <meta property="og:description" content="Production-ready alert and notification components for Tailwind CSS dashboards – success, warning, error and info variants with dismiss support." />
    <meta property="og:image" content="https://tailadmin.com/images/og/tailadmin-og.png" />
    <meta property="og:image:alt" content="Alerts Component Gallery" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ===== Twitter / X Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TailAdmin" />
    <meta name="twitter:creator" content="@TailAdmin" />
    <meta name="twitter:title" content="Alerts & Notifications | TailAdmin – Tailwind CSS Admin Dashboard Template" />
    <meta name="twitter:description" content="Production-ready alert and notification components for Tailwind CSS dashboards – success, warning, error and info variants with dismiss support." />
    <meta name="twitter:image" content="https://tailadmin.com/images/og/tailadmin-og.png" />
    <meta name="twitter:image:alt" content="Alerts Component Gallery" />

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/favicon.ico" />
    <link rel="shortcut icon" href="./images/favicon.ico" />

    <!-- ===== Performance: Preconnect & DNS Prefetch ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- ===== Schema.org Structured Data ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Alerts & Notifications | TailAdmin – Tailwind CSS Admin Dashboard Template",
      "description": "Production-ready alert and notification components for Tailwind CSS dashboards – success, warning, error and info variants with dismiss support.",
      "url": "https://tailadmin.com/ui-alerts.html",
      "publisher": {
        "@type": "Organization",
        "name": "TailAdmin",
        "url": "https://tailadmin.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://tailadmin.com/images/logo/logo.svg"
        }
      }
    }
    </script>
  </head>
  <body
    x-data="{ page: 'alerts', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `Alerts`}">
              <include src="./partials/breadcrumb.html" />
            </div>
            <!-- Breadcrumb End -->

            <div class="space-y-5 sm:space-y-6">
              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="px-6 py-5">
                  <h3
                    class="text-base font-medium text-gray-800 dark:text-white/90"
                  >
                    Success Alert
                  </h3>
                </div>
                <div
                  class="border-t border-gray-100 p-4 dark:border-gray-800 sm:p-6"
                >
                  <div class="space-y-6">
                    <include src="./partials/alert/alert-success.html" />
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="px-6 py-5">
                  <h3
                    class="text-base font-medium text-gray-800 dark:text-white/90"
                  >
                    Warning Alert
                  </h3>
                </div>
                <div
                  class="border-t border-gray-100 p-4 dark:border-gray-800 sm:p-6"
                >
                  <div class="space-y-6">
                    <include src="./partials/alert/alert-warning.html" />
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="px-6 py-5">
                  <h3
                    class="text-base font-medium text-gray-800 dark:text-white/90"
                  >
                    Error Alert
                  </h3>
                </div>
                <div
                  class="border-t border-gray-100 p-4 dark:border-gray-800 sm:p-6"
                >
                  <div class="space-y-6">
                    <include src="./partials/alert/alert-error.html" />
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="px-6 py-5">
                  <h3
                    class="text-base font-medium text-gray-800 dark:text-white/90"
                  >
                    Info Alert
                  </h3>
                </div>
                <div
                  class="border-t border-gray-100 p-4 dark:border-gray-800 sm:p-6"
                >
                  <div class="space-y-6">
                    <include src="./partials/alert/alert-info.html" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
  </body>
</html>
