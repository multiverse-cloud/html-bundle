<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ===== Primary Meta ===== -->
    <title>Calendar & Events | TailAdmin – Tailwind CSS Admin Dashboard Template</title>
    <meta name="description" content="Full-featured event calendar with month view, week view, drag-and-drop event creation and recurring events – powered by FullCalendar and Tailwind CSS." />
    <meta name="keywords" content="calendar component, event scheduling, fullcalendar, tailwind css admin, tailadmin" />
    <meta name="author" content="TailAdmin" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#465fff" />
    <link rel="canonical" href="https://tailadmin.com/calendar-month.html" />

    <!-- ===== Open Graph / Facebook ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tailadmin.com/calendar-month.html" />
    <meta property="og:site_name" content="TailAdmin" />
    <meta property="og:title" content="Calendar & Events | TailAdmin – Tailwind CSS Admin Dashboard Template" />
    <meta property="og:description" content="Full-featured event calendar with month view, week view, drag-and-drop event creation and recurring events – powered by FullCalendar and Tailwind CSS." />
    <meta property="og:image" content="https://tailadmin.com/images/og/tailadmin-og.png" />
    <meta property="og:image:alt" content="Calendar & Events Dashboard" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ===== Twitter / X Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TailAdmin" />
    <meta name="twitter:creator" content="@TailAdmin" />
    <meta name="twitter:title" content="Calendar & Events | TailAdmin – Tailwind CSS Admin Dashboard Template" />
    <meta name="twitter:description" content="Full-featured event calendar with month view, week view, drag-and-drop event creation and recurring events – powered by FullCalendar and Tailwind CSS." />
    <meta name="twitter:image" content="https://tailadmin.com/images/og/tailadmin-og.png" />
    <meta name="twitter:image:alt" content="Calendar & Events Dashboard" />

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/favicon.ico" />
    <link rel="shortcut icon" href="./images/favicon.ico" />

    <!-- ===== Performance: Preconnect & DNS Prefetch ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- ===== Schema.org Structured Data ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Calendar & Events | TailAdmin – Tailwind CSS Admin Dashboard Template",
      "description": "Full-featured event calendar with month view, week view, drag-and-drop event creation and recurring events – powered by FullCalendar and Tailwind CSS.",
      "url": "https://tailadmin.com/calendar-month.html",
      "publisher": {
        "@type": "Organization",
        "name": "TailAdmin",
        "url": "https://tailadmin.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://tailadmin.com/images/logo/logo.svg"
        }
      }
    }
    </script>
  </head>
  <body
    x-data="{ page: 'calendar', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `Calendar`}">
              <include src="./partials/breadcrumb.html" />
            </div>
            <!-- Breadcrumb End -->

            <div
              class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
            >
              <div id="calendar" class="min-h-screen"></div>
            </div>

            <!-- BEGIN MODAL -->
            <include src="./partials/calendar-event-modal.html" />
            <!-- END MODAL -->
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
  </body>
</html>
