    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#465fff" />
    <link rel="canonical" href="https://tailadmin.com/ui-videos.html" />

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/favicon.ico" />

    <!-- ===== Performance: Preconnect & DNS Prefetch ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- ===== Schema.org Structured Data ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Video Components | TailAdmin – Tailwind CSS Admin Dashboard Template",
      "description": "Video preview cards, lesson rows, embedded players and media controls for Tailwind CSS admin dashboard interfaces.",
      "url": "https://tailadmin.com/ui-videos.html",
      "publisher": {
        "@type": "Organization",
        "name": "TailAdmin",
        "url": "https://tailadmin.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://tailadmin.com/images/logo/logo.svg"
        }
      }
    }
    </script>
  </head>
  <body
    x-data="{ page: 'videos', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

        <include src="./partials/overlay.html" />

                    class="px-6 py-5 border-b border-gray-200 dark:border-gray-800"
                  >
                    <h3
                      class="text-base font-medium text-gray-800 dark:text-white/90"
                    >
                      Video Ratio 16:9
                    </h3>
                  </div>
                  <div class="p-4 sm:p-6">
                    <include src="./partials/video/video-01.html" />
                  </div>
                </div>
                <div

                >

                  <div class="p-4 sm:p-6">

                >
                  <div
                    class="px-6 py-5 border-b border-gray-200 dark:border-gray-800"
                  >
                    <h3
                      class="text-base font-medium text-gray-800 dark:text-white/90"
                    >
                      Video Ratio 4:3
                    </h3>
                  </div>
                  <div class="p-4 sm:p-6">
                    <include src="./partials/video/video-02.html" />
                  </div>
                </div>
                <div
                  class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
                >
                  <div
                    class="px-6 py-5 border-b border-gray-200 dark:border-gray-800"
                  >
                    <h3

                    <include src="./partials/video/video-04.html" />

</html>
