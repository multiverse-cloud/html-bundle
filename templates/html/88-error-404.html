<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found — mtverse</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#ffffff;color:#0f172a;position:relative;overflow:hidden;}
    html.dark body{background:#030712;color:#f8fafc;}

    /* Subtle dot-grid background */
    body::before{
      content:'';position:fixed;inset:0;
      background-image:radial-gradient(circle,#e2e8f0 1px,transparent 1px);
      background-size:28px 28px;
      opacity:.6;pointer-events:none;
    }
    html.dark body::before{background-image:radial-gradient(circle,#1e293b 1px,transparent 1px);opacity:1;}

    .page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:2rem;max-width:520px;width:100%;}
    .num-404{font-size:clamp(6rem,20vw,10rem);font-weight:900;line-height:1;color:#f1f5f9;letter-spacing:-4px;user-select:none;}
    html.dark .num-404{color:#1e293b;}
    .heading{font-size:1.75rem;font-weight:700;margin-top:-1rem;margin-bottom:.5rem;color:#0f172a;}
    html.dark .heading{color:#f8fafc;}
    .sub{color:#64748b;font-size:1rem;line-height:1.6;margin-bottom:2rem;}
    html.dark .sub{color:#94a3b8;}
    .search-wrap{width:100%;position:relative;margin-bottom:1.5rem;}
    .search-input{width:100%;padding:.75rem 1rem .75rem 2.75rem;border:1.5px solid #e2e8f0;border-radius:.75rem;font-size:.95rem;background:#f8fafc;color:#0f172a;outline:none;transition:border-color .15s,box-shadow .15s;}
    .search-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12);}
    html.dark .search-input{background:#0f172a;border-color:#334155;color:#f8fafc;}
    html.dark .search-input:focus{border-color:#3b82f6;}
    .search-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none;}
    .btn-row{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;margin-bottom:2.5rem;}
    .btn-outline{padding:.65rem 1.4rem;border:1.5px solid #e2e8f0;border-radius:.6rem;font-size:.9rem;font-weight:600;color:#374151;background:transparent;cursor:pointer;transition:border-color .15s,background .15s;}
    .btn-outline:hover{border-color:#9ca3af;background:#f9fafb;}
    html.dark .btn-outline{border-color:#334155;color:#d1d5db;}
    html.dark .btn-outline:hover{background:#1e293b;}
    .btn-solid{padding:.65rem 1.4rem;border-radius:.6rem;font-size:.9rem;font-weight:600;color:#fff;background:#2563eb;border:none;cursor:pointer;transition:background .15s;}
    .btn-solid:hover{background:#1d4ed8;}
    .quick-links{display:flex;gap:1.25rem;flex-wrap:wrap;justify-content:center;}
    .quick-links a{font-size:.85rem;color:#2563eb;text-decoration:none;font-weight:500;}
    html.dark .quick-links a{color:#60a5fa;}
    .quick-links a:hover{text-decoration:underline;}
    .quick-links span{color:#cbd5e1;}

    /* Dark mode toggle */
    #darkToggle{position:fixed;top:1.25rem;right:1.25rem;z-index:100;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:999px;padding:.5rem .85rem;font-size:.8rem;font-weight:600;cursor:pointer;color:#374151;transition:background .15s;}
    html.dark #darkToggle{background:#1e293b;border-color:#334155;color:#e2e8f0;}
    #darkToggle:hover{background:#e2e8f0;}
    html.dark #darkToggle:hover{background:#334155;}
  </style>
</head>
<body>
  <button id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">
    <span id="darkIcon">🌙 Dark</span>
  </button>

  <div class="page">
    <div class="num-404" aria-hidden="true">404</div>
    <h1 class="heading">Page not found</h1>
    <p class="sub">The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>

    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="search-input" type="search" placeholder="Search for something else…" onkeydown="handleSearch(event)" id="searchInput"/>
    </div>

    <div class="btn-row">
      <button class="btn-outline" onclick="history.back()">← Go Back</button>
      <button class="btn-solid" onclick="location.href='01-main-dashboard.html'">Go to Dashboard</button>
    </div>

    <nav class="quick-links" aria-label="Quick links">
      <a href="01-main-dashboard.html">Home</a>
      <span aria-hidden="true">·</span>
      <a href="01-main-dashboard.html">Dashboard</a>
      <span aria-hidden="true">·</span>
      <a href="49-settings-general.html">Settings</a>
      <span aria-hidden="true">·</span>
      <a href="118-faq.html">Help Center</a>
    </nav>
  </div>

  <script>
    // Dark mode
    const prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
    let dark=localStorage.getItem('dark')==='1'||(localStorage.getItem('dark')===null&&prefersDark);
    function applyDark(){
      document.documentElement.classList.toggle('dark',dark);
      document.getElementById('darkIcon').textContent=dark?'☀️ Light':'🌙 Dark';
    }
    applyDark();
    function toggleDark(){dark=!dark;localStorage.setItem('dark',dark?'1':'0');applyDark();}

    // Search
    function handleSearch(e){
      if(e.key==='Enter'){
        const q=document.getElementById('searchInput').value.trim();
        if(q)alert('Searching for: '+q);
      }
    }
  </script>
</body>
</html>
