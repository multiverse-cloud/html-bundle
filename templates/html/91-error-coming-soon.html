<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#465fff" />
  <meta name="description" content="Production-ready Coming Soon – Template Marketplace | mtverse HTML dashboard template with responsive TailAdmin-style layout, dark mode, command palette, actions, loaders, and polished UI states." />
  <title>Coming Soon – Template Marketplace | mtverse — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-slideDown {
      animation: slideDown 0.2s ease-out;
    }
    .sidebar-text {
      transition: opacity 0.2s ease-in-out;
    }
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100">

<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar Container -->
  <div id="sidebar-container"></div>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">

      </div>
    </main>
  </div>
</div>

<!-- Common Components -->
<script src="common-loader.js"></script>
<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>

</body>
</html>
