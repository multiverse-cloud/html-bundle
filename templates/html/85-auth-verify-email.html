<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — mtverse</title>
  <style>
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .auth-card{animation:fadeIn .3s ease}
    @keyframes spin{to{transform:rotate(360deg)}}
    .animate-spin{animation:spin 1s linear infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(1.05)}}
    .email-pulse{animation:pulse 2.5s ease-in-out infinite}
    @keyframes slideDown{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:200px;transform:translateY(0)}}
    .slide-down{animation:slideDown .3s ease forwards}
    .field-error input{border-color:#ef4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.12)!important}
    @media(prefers-reduced-motion:reduce){.auth-card,.animate-spin,.email-pulse,.slide-down{animation:none!important}}
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-950 flex items-center justify-center px-4 py-12 font-sans">

  <!-- Dark mode toggle -->
  <button id="darkToggle" aria-label="Toggle dark mode"
    class="fixed top-4 right-4 z-50 rounded-full p-2 bg-white dark:bg-gray-800 shadow border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
    <svg class="w-5 h-5 text-gray-600 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
    </svg>
    <svg class="w-5 h-5 text-yellow-400 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    </svg>
  </button>

  <div class="auth-card w-full max-w-md">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
        <span class="text-white font-bold text-base leading-none">M</span>
      </div>
      <span class="text-gray-900 dark:text-white font-bold text-xl tracking-tight">mtverse</span>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl px-8 py-10 border border-gray-100 dark:border-gray-800">

      <!-- Animated email icon -->
      <div class="flex justify-center mb-6">
        <div class="email-pulse w-20 h-20 bg-blue-50 dark:bg-blue-900/20 rounded-3xl flex items-center justify-center">
          <svg class="w-10 h-10 text-blue-600 dark:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
      </div>

      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Check your email</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400">
          We sent a verification link to<br/>
          <strong class="text-gray-700 dark:text-gray-300">alice@example.com</strong>
        </p>
      </div>

      <!-- Progress steps -->
      <div class="flex items-center justify-center gap-0 mb-8">
        <!-- Step 1: Account created -->
        <div class="flex flex-col items-center">
          <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1.5 text-center leading-tight">Account<br/>created</p>
        </div>
        <div class="flex-1 h-0.5 bg-green-500 mx-1 mb-5"></div>
        <!-- Step 2: Email sent (active) -->
        <div class="flex flex-col items-center">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center ring-4 ring-blue-100 dark:ring-blue-900/40">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </div>
          <p class="text-xs text-blue-600 dark:text-blue-400 font-semibold mt-1.5 text-center leading-tight">Email<br/>sent</p>
        </div>
        <div class="flex-1 h-0.5 bg-gray-200 dark:bg-gray-700 mx-1 mb-5"></div>
        <!-- Step 3: Verify -->
        <div class="flex flex-col items-center">
          <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center">
            <svg class="w-4 h-4 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <p class="text-xs text-gray-400 dark:text-gray-500 mt-1.5 text-center leading-tight">Verify<br/>email</p>
        </div>
        <div class="flex-1 h-0.5 bg-gray-200 dark:bg-gray-700 mx-1 mb-5"></div>
        <!-- Step 4: Done -->
        <div class="flex flex-col items-center">
          <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center">
            <svg class="w-4 h-4 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
            </svg>
          </div>
          <p class="text-xs text-gray-400 dark:text-gray-500 mt-1.5 text-center leading-tight">Done</p>
        </div>
      </div>

      <!-- Primary CTA -->
      <a href="mailto:" class="w-full inline-flex items-center justify-center gap-2 rounded-lg bg-blue-600 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 transition-colors mb-6">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Open Email App
      </a>


      <!-- Didn't get it + resend -->
      <div class="rounded-lg bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 px-4 py-4 mb-5">
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">Didn't get it?</p>
        <button id="resendBtn"
          class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 py-2.5 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <svg id="resendSpinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
          <span id="resendTxt">Resend verification email</span>
        </button>
        <p id="countdownTxt" class="text-xs text-gray-400 dark:text-gray-500 mt-2 text-center hidden">Resend available in <span id="countdown">60</span>s</p>
      </div>

      <!-- Wrong email — toggle change email form -->
      <div class="mb-5">
        <button id="wrongEmailBtn" class="w-full text-center text-sm text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
          Wrong email? <span class="text-blue-600 dark:text-blue-400 font-medium underline">Change email address</span>
        </button>

        <!-- Slide-in change email form -->
        <div id="changeEmailForm" class="hidden overflow-hidden mt-4">
          <div class="rounded-lg border border-blue-100 dark:border-blue-800 bg-blue-50 dark:bg-blue-900/10 px-4 py-4 space-y-3">
            <p class="text-xs font-semibold text-blue-700 dark:text-blue-300 uppercase tracking-wide">Update email address</p>
            <div>
              <label for="newEmail" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">New email address</label>
              <input id="newEmail" type="email" placeholder="newemail@example.com"
                class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-3.5 py-2.5 text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow" />
              <p id="newEmailErr" class="hidden mt-1 text-xs text-red-600 dark:text-red-400">Please enter a valid email</p>
            </div>
            <button id="saveEmailBtn" type="button"
              class="w-full rounded-lg bg-blue-600 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
              <svg id="saveSpinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
              </svg>
              <span id="saveTxt">Save & resend</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Back to sign in -->
      <div class="text-center">
        <a href="81-auth-login.html" class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back to sign in
        </a>
      </div>
    </div>
  </div>

<script>
(function(){if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');})();
document.getElementById('darkToggle').addEventListener('click',function(){
  localStorage.setItem('darkMode',document.documentElement.classList.toggle('dark'));
});

/* Resend countdown */
function startResendCountdown(){
  const btn=document.getElementById('resendBtn');
  const cdTxt=document.getElementById('countdownTxt');
  const cdEl=document.getElementById('countdown');
  btn.disabled=true;
  cdTxt.classList.remove('hidden');
  let secs=60;
  const timer=setInterval(function(){
    secs--;
    if(cdEl) cdEl.textContent=secs;
    if(secs<=0){
      clearInterval(timer);
      btn.disabled=false;
      cdTxt.classList.add('hidden');
      document.getElementById('resendTxt').textContent='Resend verification email';
    }
  },1000);
}

/* Resend button */
document.getElementById('resendBtn').addEventListener('click',function(){
  if(this.disabled)return;
  const spinner=document.getElementById('resendSpinner');
  const txt=document.getElementById('resendTxt');
  spinner.classList.remove('hidden');
  txt.textContent='Sending…';
  setTimeout(function(){
    spinner.classList.add('hidden');
    txt.textContent='Email sent!';
    setTimeout(function(){txt.textContent='Resend verification email';},2000);
    startResendCountdown();
  },1200);
});

/* Wrong email toggle */
const changeForm=document.getElementById('changeEmailForm');
document.getElementById('wrongEmailBtn').addEventListener('click',function(){
  const hidden=changeForm.classList.contains('hidden');
  if(hidden){
    changeForm.classList.remove('hidden');
    changeForm.classList.add('slide-down');
  } else {
    changeForm.classList.add('hidden');
    changeForm.classList.remove('slide-down');
  }
});

/* Save & resend */
document.getElementById('saveEmailBtn').addEventListener('click',function(){
  const emailVal=document.getElementById('newEmail').value.trim();
  const errEl=document.getElementById('newEmailErr');
  if(!emailVal||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)){
    errEl.classList.remove('hidden'); return;
  }
  errEl.classList.add('hidden');
  const spinner=document.getElementById('saveSpinner');
  const saveTxt=document.getElementById('saveTxt');
  spinner.classList.remove('hidden');
  saveTxt.textContent='Saving…';
  setTimeout(function(){
    spinner.classList.add('hidden');
    saveTxt.textContent='Save & resend';
    changeForm.classList.add('hidden');
    document.querySelector('.text-center p strong').textContent=emailVal;
    startResendCountdown();
  },1200);
});

/* Start initial countdown */
startResendCountdown();
</script>
</body>
</html>
