<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#465fff" />
  <meta name="description" content="Production-ready Contact Form HTML dashboard template with responsive TailAdmin-style layout, dark mode, command palette, actions, loaders, and polished UI states." />
  <title>Contact Form — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-slideDown {
      animation: slideDown 0.2s ease-out;
    }
    .sidebar-text {
      transition: opacity 0.2s ease-in-out;
    }
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100">

<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar Container -->
  <div id="sidebar-container"></div>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">
<div class="mb-6"><h1 class="text-2xl font-bold text-gray-900">Contact Form</h1><p class="text-sm text-gray-500 mt-1">Send a message to support or a team member</p></div>
      <div class="max-w-2xl">
        <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label class="block text-xs font-medium text-gray-700 mb-1">First Name</label><input type="text" placeholder="John" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" /></div>
            <div><label class="block text-xs font-medium text-gray-700 mb-1">Last Name</label><input type="text" placeholder="Doe" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" /></div>
          </div>
          <div><label class="block text-xs font-medium text-gray-700 mb-1">Email</label><input type="email" placeholder="you@company.com" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" /></div>
          <div><label class="block text-xs font-medium text-gray-700 mb-1">Subject</label><select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700"><option>General Inquiry</option><option>Technical Support</option><option>Billing</option><option>Feature Request</option><option>Other</option></select></div>
          <div><label class="block text-xs font-medium text-gray-700 mb-1">Priority</label><div class="flex gap-3"><label class="flex items-center gap-2 text-sm text-gray-700"><input type="radio" name="priority" value="low" class="rounded-full" /> Low</label><label class="flex items-center gap-2 text-sm text-gray-700"><input type="radio" name="priority" value="medium" checked class="rounded-full" /> Medium</label><label class="flex items-center gap-2 text-sm text-gray-700"><input type="radio" name="priority" value="high" class="rounded-full" /> High</label></div></div>
          <div><label class="block text-xs font-medium text-gray-700 mb-1">Message</label><textarea rows="5" placeholder="Describe your issue or question..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea></div>
          <div><label class="block text-xs font-medium text-gray-700 mb-1">Attachment (optional)</label><div class="border-2 border-dashed border-gray-200 rounded-lg p-4 text-center text-sm text-gray-400 hover:border-blue-400 cursor-pointer transition">Click to upload or drag & drop (max 10MB)</div></div>
          <div class="flex items-center gap-2"><input type="checkbox" id="agree" class="rounded"/><label for="agree" class="text-xs text-gray-600">I agree to the <a href="#" class="text-blue-600 hover:underline">terms of service</a></label></div>
          <div class="flex gap-3"><button type="submit" class="bg-blue-600 text-white text-sm px-5 py-2 rounded-lg hover:bg-blue-700 transition">Send Message</button><button type="reset" class="border border-gray-300 text-gray-700 text-sm px-5 py-2 rounded-lg hover:bg-gray-50 transition">Clear</button></div>
        </div>
      </div>
      </div>
    </main>
  </div>
</div>

<!-- Common Components -->
<script src="common-loader.js"></script>
<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>

</body>
</html>
