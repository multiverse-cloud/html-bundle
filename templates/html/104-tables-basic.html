<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Table — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .sort-arrow::after{content:'↕';opacity:.4;margin-left:4px;font-size:.7rem}
    th.sorted-asc .sort-arrow::after{content:'↑';opacity:1}
    th.sorted-desc .sort-arrow::after{content:'↓';opacity:1}
    th{cursor:pointer;user-select:none}
    th:hover .sort-arrow::after{opacity:.8}
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100">
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>
<div class="flex h-screen overflow-hidden">
  <div id="sidebar-container"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="header-container"></div>
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">


        <!-- Page Header -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
          <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Basic Table</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Clean data table with sorting, pagination, and status badges</p>
          </div>
        </div>

        <!-- Table Card -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm">
          <!-- Search Row -->
          <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700 flex items-center gap-3">
            <div class="relative flex-1 max-w-xs">
              <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
              </span>
              <input type="text" id="searchInput" placeholder="Search orders…" oninput="filterOrders()" class="w-full pl-9 pr-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" />
            </div>
            <span class="text-xs text-gray-400 dark:text-gray-500 ml-auto" id="orderCount">47 orders</span>
          </div>

          <!-- Scrollable table wrapper (mobile) -->
          <div class="overflow-x-auto">
            <table class="w-full text-sm min-w-[600px]">
              <thead>
                <tr class="border-b border-gray-100 dark:border-gray-700 text-left">
                  <th class="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" onclick="sortOrders('order')">Order #<span class="sort-arrow" id="sarr_order"></span></th>
                  <th class="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" onclick="sortOrders('customer')">Customer<span class="sort-arrow" id="sarr_customer"></span></th>
                  <th class="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" onclick="sortOrders('product')">Product<span class="sort-arrow" id="sarr_product"></span></th>
                  <th class="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" onclick="sortOrders('amount')">Amount<span class="sort-arrow" id="sarr_amount"></span></th>
                  <th class="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" onclick="sortOrders('status')">Status<span class="sort-arrow" id="sarr_status"></span></th>
                  <th class="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" onclick="sortOrders('date')">Date<span class="sort-arrow" id="sarr_date"></span></th>
                </tr>
              </thead>
              <tbody id="ordersBody"></tbody>
            </table>
          </div>

          <!-- Empty State -->
          <div id="emptyState" class="hidden py-16 text-center">
            <svg class="mx-auto mb-4 w-14 h-14 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z"/></svg>
            <p class="text-base font-medium text-gray-500 dark:text-gray-400">No orders found</p>
            <p class="text-sm text-gray-400 dark:text-gray-500 mt-1">Try a different search term.</p>
          </div>

          <!-- Pagination -->
          <div class="px-4 py-3 border-t border-gray-100 dark:border-gray-700 flex flex-col sm:flex-row items-center justify-between gap-3">
            <p class="text-sm text-gray-500 dark:text-gray-400" id="pageInfo">Showing 1–10 of 47 orders</p>
            <div class="flex items-center gap-1" id="pageControls"></div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>
<script>
const STATUS_MAP = {
  'Paid':       'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400',
  'Processing': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400',
  'Refunded':   'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400',
  'Pending':    'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400'
};

const ALL_ORDERS = [
  {order:'#ORD-001',customer:'Sarah Chen',product:'Pro Membership',amount:'$49.00',status:'Paid',date:'May 27',dateSort:20240527},
  {order:'#ORD-002',customer:'Jordan Lee',product:'Design Kit',amount:'$29.00',status:'Paid',date:'May 27',dateSort:20240527},
  {order:'#ORD-003',customer:'Marcus Kim',product:'Analytics Pack',amount:'$79.00',status:'Processing',date:'May 26',dateSort:20240526},
  {order:'#ORD-004',customer:'Emma Davis',product:'Logo Bundle',amount:'$19.00',status:'Paid',date:'May 26',dateSort:20240526},
  {order:'#ORD-005',customer:'Noah Wilson',product:'Video Course',amount:'$99.00',status:'Refunded',date:'May 25',dateSort:20240525},
  {order:'#ORD-006',customer:'Alice Kim',product:'Pro Membership',amount:'$49.00',status:'Paid',date:'May 24',dateSort:20240524},
  {order:'#ORD-007',customer:'Bob Jones',product:'Design Kit',amount:'$29.00',status:'Pending',date:'May 23',dateSort:20240523},
  {order:'#ORD-008',customer:'Carol Lee',product:'Analytics Pack',amount:'$79.00',status:'Paid',date:'May 22',dateSort:20240522},
  {order:'#ORD-009',customer:'Dan Miller',product:'Logo Bundle',amount:'$19.00',status:'Paid',date:'May 21',dateSort:20240521},
  {order:'#ORD-010',customer:'Emma Torres',product:'Video Course',amount:'$99.00',status:'Processing',date:'May 20',dateSort:20240520}
];

// Simulate 47 total: duplicate with modified IDs
const ALL_ORDERS_FULL = [...ALL_ORDERS];
for (let i=11;i<=47;i++) {
  const base = ALL_ORDERS[(i-1)%10];
  ALL_ORDERS_FULL.push({...base, order:'#ORD-'+String(i).padStart(3,'0'), dateSort:base.dateSort-i});
}

let filtered = [...ALL_ORDERS_FULL];
let sortCol = '', sortDir = 'asc';
let currentPage = 1;
const pageSize = 10;

function filterOrders() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = ALL_ORDERS_FULL.filter(o =>
    !q || o.order.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q) ||
    o.product.toLowerCase().includes(q) || o.status.toLowerCase().includes(q)
  );
  currentPage = 1;
  renderOrders();
}

function sortOrders(col) {
  if (sortCol===col) sortDir=sortDir==='asc'?'desc':'asc';
  else { sortCol=col; sortDir='asc'; }
  // Update arrow indicators
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted-asc','sorted-desc'));
  const colMap = {order:0,customer:1,product:2,amount:3,status:4,date:5};
  const ths = document.querySelectorAll('thead th');
  const idx = colMap[col];
  if (idx!==undefined) ths[idx].classList.add('sorted-'+sortDir);
  filtered.sort((a,b)=>{
    let va, vb;
    if (col==='amount') { va=parseFloat(a.amount.replace('$','')); vb=parseFloat(b.amount.replace('$','')); }
    else if (col==='date') { va=a.dateSort; vb=b.dateSort; }
    else { va=String(a[col]).toLowerCase(); vb=String(b[col]).toLowerCase(); }
    if (va<vb) return sortDir==='asc'?-1:1;
    if (va>vb) return sortDir==='asc'?1:-1;
    return 0;
  });
  renderOrders();
}

function renderOrders() {
  const tbody = document.getElementById('ordersBody');
  const empty = document.getElementById('emptyState');
  empty.classList.toggle('hidden', filtered.length > 0);
  document.getElementById('orderCount').textContent = filtered.length + ' orders';
  if (filtered.length === 0) { tbody.innerHTML=''; renderPageControls(); return; }
  const start = (currentPage-1)*pageSize;
  const page = filtered.slice(start, start+pageSize);
  tbody.innerHTML = page.map(o => `
    <tr class="border-b border-gray-50 dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
      <td class="px-4 py-3 font-mono text-xs text-gray-600 dark:text-gray-400 font-medium">${o.order}</td>
      <td class="px-4 py-3 font-medium text-gray-900 dark:text-gray-100">${o.customer}</td>
      <td class="px-4 py-3 text-gray-600 dark:text-gray-400">${o.product}</td>
      <td class="px-4 py-3 font-semibold text-gray-900 dark:text-gray-100">${o.amount}</td>
      <td class="px-4 py-3"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${STATUS_MAP[o.status]||''}">${o.status}</span></td>
      <td class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400">${o.date}</td>
    </tr>`).join('');
  renderPageControls();
}

function renderPageControls() {
  const total = filtered.length;
  const pages = Math.ceil(total/pageSize);
  const start = Math.min((currentPage-1)*pageSize+1, total);
  const end = Math.min(currentPage*pageSize, total);
  document.getElementById('pageInfo').textContent = total===0 ? 'No orders' : `Showing ${start}–${end} of ${total} orders`;
  const ctrl = document.getElementById('pageControls');
  ctrl.innerHTML = '';
  function mkBtn(label, page, disabled, active) {
    const b = document.createElement('button');
    b.innerHTML = label;
    b.className = `px-3 py-1.5 text-sm rounded-lg border transition min-w-[36px] ${active?'bg-blue-600 border-blue-600 text-white':'border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700'} ${disabled?'opacity-40 cursor-not-allowed':''}`;
    if (!disabled) b.onclick = () => { currentPage=page; renderOrders(); };
    return b;
  }
  ctrl.appendChild(mkBtn('Prev', currentPage-1, currentPage===1, false));
  // Show first, last and pages around current
  const maxVisible = 5;
  let pagesToShow = [];
  if (pages <= maxVisible+2) {
    pagesToShow = Array.from({length:pages},(_,i)=>i+1);
  } else {
    pagesToShow = [1];
    if (currentPage > 3) pagesToShow.push('...');
    for (let p=Math.max(2,currentPage-1);p<=Math.min(pages-1,currentPage+1);p++) pagesToShow.push(p);
    if (currentPage < pages-2) pagesToShow.push('...');
    pagesToShow.push(pages);
  }
  pagesToShow.forEach(p => {
    if (p==='...') { const s=document.createElement('span'); s.textContent='…'; s.className='px-2 text-gray-400'; ctrl.appendChild(s); }
    else ctrl.appendChild(mkBtn(p, p, false, p===currentPage));
  });
  ctrl.appendChild(mkBtn('Next', currentPage+1, currentPage===pages||pages===0, false));
}

renderOrders();
</script>
</body>
</html>
