<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Products — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    tr:hover .row-actions{opacity:1!important;}
    .row-actions{opacity:0;transition:opacity .15s;}
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100" style="font-family:'Outfit',sans-serif;">
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>
<div class="flex h-screen overflow-hidden">
  <div id="sidebar-container"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="header-container"></div>
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">

        <!-- Page header -->
        <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Products</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Manage your product catalog, pricing, and inventory</p>
          </div>
          <div class="flex flex-wrap gap-2">
            <button type="button" class="inline-flex items-center gap-1.5 rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition dark:border-gray-700 dark:bg-white/[.03] dark:text-gray-300">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Import
            </button>
            <button type="button" class="inline-flex items-center gap-1.5 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 transition shadow-sm">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Product
            </button>
          </div>
        </div>

        <div class="rounded-2xl border border-gray-200 bg-white overflow-hidden dark:border-gray-800 dark:bg-white/[.03]">
          <!-- Filter row -->
          <div class="px-5 py-4 border-b border-gray-200 dark:border-gray-800 flex flex-wrap gap-3">
            <div class="relative flex-1 min-w-[160px]">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <input type="text" id="searchInput" placeholder="Search products…" oninput="filterTable()"
                class="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500" />
            </div>
            <select id="catFilter" onchange="filterTable()"
              class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300">
              <option value="">All Categories</option>
              <option>Digital</option>
              <option>Physical</option>
              <option>Subscription</option>
            </select>
            <select id="statusFilter" onchange="filterTable()"
              class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300">
              <option value="">All Status</option>
              <option>Active</option>
              <option>Low Stock</option>
              <option>Out of Stock</option>
            </select>
            <button onclick="clearFilters()" class="text-sm text-gray-500 hover:text-gray-700 font-medium dark:text-gray-400 dark:hover:text-gray-200">Clear</button>
          </div>

          <!-- Table -->
          <div class="overflow-x-auto">
            <table class="w-full text-sm" id="productsTable">
              <thead>
                <tr class="border-b border-gray-200 dark:border-gray-800 bg-gray-50/80 dark:bg-white/[.02]">
                  <th class="px-4 py-3 text-left w-10"><input type="checkbox" id="selectAll" onclick="toggleAll(this)" class="rounded border-gray-300 text-blue-600 dark:border-gray-600" /></th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider w-12">Thumb</th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider cursor-pointer hover:text-blue-600" onclick="sortTable('name')">Product Name ↕</th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider">SKU</th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider cursor-pointer hover:text-blue-600" onclick="sortTable('price')">Price ↕</th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider cursor-pointer hover:text-blue-600" onclick="sortTable('stock')">Stock ↕</th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider">Category</th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider">Status</th>
                  <th class="px-4 py-3 text-right font-semibold text-xs text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
              </thead>
              <tbody id="productsBody"></tbody>
            </table>
          </div>

          <!-- Empty state -->
          <div id="emptyState" class="hidden px-5 py-16 text-center">
            <svg class="mx-auto mb-3 text-gray-300" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <p class="text-gray-500 dark:text-gray-400 font-medium">No products match your filters</p>
            <button onclick="clearFilters()" class="mt-3 text-sm text-blue-600 hover:underline">Clear filters</button>
          </div>

          <!-- Pagination -->
          <div class="px-5 py-4 border-t border-gray-200 dark:border-gray-800 flex flex-wrap items-center justify-between gap-3">
            <span class="text-sm text-gray-500 dark:text-gray-400" id="paginationInfo">Showing 10 products</span>
            <div class="flex items-center gap-1">
              <button class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-500 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400">← Prev</button>
              <button class="rounded-lg border border-blue-600 bg-blue-600 px-3 py-1.5 text-sm text-white">1</button>
              <button class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-500 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400">2</button>
              <button class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-500 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400">Next →</button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>
<script>
const products = [
  { name:'Pro Membership',   sku:'SKU-001', price:'$49/mo',  priceNum:49,  stock:null,  cat:'Subscription', status:'Active',       color:'#7c3aed' },
  { name:'Design Kit',       sku:'SKU-014', price:'$29',     priceNum:29,  stock:847,   cat:'Digital',      status:'Active',       color:'#0891b2' },
  { name:'Analytics Pack',   sku:'SKU-022', price:'$79',     priceNum:79,  stock:null,  cat:'Digital',      status:'Active',       color:'#1d4ed8' },
  { name:'Logo Bundle',      sku:'SKU-031', price:'$19',     priceNum:19,  stock:1204,  cat:'Digital',      status:'Active',       color:'#059669' },
  { name:'Video Course',     sku:'SKU-048', price:'$99',     priceNum:99,  stock:23,    cat:'Digital',      status:'Low Stock',    color:'#d97706' },
  { name:'T-Shirt (S)',      sku:'SKU-055', price:'$25',     priceNum:25,  stock:0,     cat:'Physical',     status:'Out of Stock', color:'#dc2626' },
  { name:'Sticker Pack',     sku:'SKU-061', price:'$9',      priceNum:9,   stock:342,   cat:'Physical',     status:'Active',       color:'#0d9488' },
  { name:'eBook Bundle',     sku:'SKU-072', price:'$39',     priceNum:39,  stock:null,  cat:'Digital',      status:'Active',       color:'#8b5cf6' },
  { name:'Hoodie (M)',       sku:'SKU-083', price:'$49',     priceNum:49,  stock:8,     cat:'Physical',     status:'Low Stock',    color:'#b45309' },
  { name:'Annual Plan',      sku:'SKU-090', price:'$399/yr', priceNum:399, stock:null,  cat:'Subscription', status:'Active',       color:'#2563eb' },
];

const statusClasses = {
  'Active':       'bg-green-100 text-green-700 dark:bg-green-500/15 dark:text-green-400',
  'Low Stock':    'bg-amber-100 text-amber-700 dark:bg-amber-500/15 dark:text-amber-400',
  'Out of Stock': 'bg-red-100 text-red-700 dark:bg-red-500/15 dark:text-red-400',
};
const catClasses = {
  'Digital':      'bg-blue-50 text-blue-700 dark:bg-blue-500/10 dark:text-blue-300',
  'Physical':     'bg-gray-100 text-gray-600 dark:bg-gray-500/10 dark:text-gray-400',
  'Subscription': 'bg-violet-100 text-violet-700 dark:bg-violet-500/15 dark:text-violet-400',
};

let filtered = [...products];
let selected = new Set();
let sortKey = null, sortAsc = true;

function stockLabel(p) {
  if (p.stock === null) return '<span class="text-gray-400">∞</span>';
  if (p.stock === 0) return '<span class="text-red-500 font-semibold">0</span>';
  if (p.stock < 25) return `<span class="text-amber-600 font-semibold">${p.stock}</span>`;
  return `<span class="text-gray-700 dark:text-gray-300">${p.stock.toLocaleString()}</span>`;
}

function renderTable() {
  const tbody = document.getElementById('productsBody');
  const empty = document.getElementById('emptyState');
  if (filtered.length === 0) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  tbody.innerHTML = filtered.map(p => `
    <tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-white/[.02] transition group${selected.has(p.sku)?' bg-blue-50/40 dark:bg-blue-500/5':''}">
      <td class="px-4 py-3"><input type="checkbox" ${selected.has(p.sku)?'checked':''} onchange="toggleRow('${p.sku}',this)" class="rounded border-gray-300 text-blue-600 dark:border-gray-600" /></td>
      <td class="px-4 py-3">
        <div class="h-9 w-9 rounded-lg flex-shrink-0 flex items-center justify-center text-white text-xs font-bold" style="background:${p.color}">${p.name[0]}</div>
      </td>
      <td class="px-4 py-3 font-medium text-gray-900 dark:text-white">${p.name}</td>
      <td class="px-4 py-3 font-mono text-xs text-gray-500 dark:text-gray-400">${p.sku}</td>
      <td class="px-4 py-3 font-semibold text-gray-900 dark:text-white">${p.price}</td>
      <td class="px-4 py-3">${stockLabel(p)}</td>
      <td class="px-4 py-3"><span class="rounded-full px-2.5 py-0.5 text-xs font-medium ${catClasses[p.cat]}">${p.cat}</span></td>
      <td class="px-4 py-3"><span class="rounded-full px-2.5 py-0.5 text-xs font-semibold ${statusClasses[p.status]}">${p.status}</span></td>
      <td class="px-4 py-3 text-right">
        <div class="row-actions inline-flex items-center gap-1">
          <button class="rounded-lg px-2.5 py-1.5 text-xs font-medium text-blue-600 hover:bg-blue-50 dark:text-blue-400 dark:hover:bg-blue-500/10 transition">Edit</button>
          <button class="rounded-lg px-2.5 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition">Delete</button>
        </div>
      </td>
    </tr>
  `).join('');
  document.getElementById('paginationInfo').textContent = `Showing ${filtered.length} of ${products.length} products`;
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const st = document.getElementById('statusFilter').value;
  filtered = products.filter(p =>
    (!q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)) &&
    (!cat || p.cat === cat) &&
    (!st || p.status === st)
  );
  renderTable();
}

function clearFilters() {
  ['searchInput','catFilter','statusFilter'].forEach(id => { const el = document.getElementById(id); if(el.tagName==='SELECT') el.value=''; else el.value=''; });
  filtered = [...products];
  renderTable();
}

function toggleRow(sku, cb) { if(cb.checked) selected.add(sku); else selected.delete(sku); renderTable(); }
function toggleAll(cb) { filtered.forEach(p => cb.checked ? selected.add(p.sku) : selected.delete(p.sku)); renderTable(); }

function sortTable(key) {
  if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
  filtered.sort((a,b) => {
    let av = a[key], bv = b[key];
    if (av === null) av = -1; if (bv === null) bv = -1;
    return (av < bv ? -1 : av > bv ? 1 : 0) * (sortAsc ? 1 : -1);
  });
  renderTable();
}

renderTable();
</script>
</body>
</html>
