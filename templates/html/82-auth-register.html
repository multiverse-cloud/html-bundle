<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — mtverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tailwind-production.css" />
  <link rel="stylesheet" href="pro-styles.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; }

    /* Dot-grid background */
    body {
      background-image: radial-gradient(circle, rgba(99,102,241,.12) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .dark body {
      background-image: radial-gradient(circle, rgba(99,102,241,.06) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Entrance */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-enter { animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    /* Strength segments */
    .seg { height: 4px; border-radius: 9999px; background: #e5e7eb; transition: background 0.3s ease; }
    .seg.s-weak  { background: #ef4444; }
    .seg.s-fair  { background: #f59e0b; }
    .seg.s-good  { background: #3b82f6; }
    .seg.s-strong { background: #22c55e; }

    /* Input icon wrapper */
    .iw { position: relative; }
    .iw svg.icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #9ca3af; pointer-events: none; }
    .iw input { padding-left: 2.5rem; }

    @media (prefers-reduced-motion: reduce) {
      .card-enter, .spin { animation: none !important; }
      .seg { transition: none !important; }
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-950 py-12 px-4">


  <!-- Dark mode toggle -->
  <button id="darkToggle" aria-label="Toggle dark mode"
    class="fixed top-4 right-4 z-50 w-10 h-10 rounded-full bg-white dark:bg-gray-800 shadow-lg border border-gray-200 dark:border-gray-700 flex items-center justify-center hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
    <svg class="w-5 h-5 text-gray-500 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
    </svg>
    <svg class="w-5 h-5 text-yellow-400 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    </svg>
  </button>

  <div class="max-w-lg mx-auto card-enter">

    <!-- Above card: logo + progress -->
    <div class="text-center mb-8">
      <!-- Logo -->
      <div class="inline-flex items-center gap-2.5 mb-6">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-md">
          <span class="text-white font-bold text-lg select-none leading-none">M</span>
        </div>
        <span class="text-gray-900 dark:text-white font-bold text-2xl tracking-tight">mtverse</span>
      </div>

      <!-- Step progress -->
      <div class="flex items-center justify-center gap-3">
        <!-- Step 1: active/current -->
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center shadow-md">
            <span class="text-white text-xs font-bold">1</span>
          </div>
          <span class="text-xs font-semibold text-blue-600">Account</span>
        </div>
        <!-- Connector -->
        <div class="w-10 h-0.5 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
        <!-- Step 2: upcoming -->
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full border-2 border-gray-200 dark:border-gray-700 flex items-center justify-center">
            <span class="text-xs font-bold text-gray-400 dark:text-gray-600">2</span>
          </div>
          <span class="text-xs font-medium text-gray-400 dark:text-gray-600">Profile</span>
        </div>
      </div>
      <p class="text-xs text-gray-400 mt-2">Step 1 of 2</p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-800 px-8 py-8">

      <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-1">Create your account</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-7">Join 12,000+ teams using mtverse</p>

      <form id="regForm" novalidate>

        <!-- Full Name -->
        <div class="mb-5">
          <label for="fullName" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Full name</label>
          <div class="iw">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input id="fullName" type="text" autocomplete="name" placeholder="Jane Smith"
              class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 pr-3.5 py-2.5 text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
          </div>
          <p id="nameErr" class="hidden mt-1.5 text-xs text-red-500" style="display:none">Full name is required</p>
        </div>

        <!-- Work Email -->
        <div class="mb-5">
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Work email</label>
          <div class="iw">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input id="email" type="email" autocomplete="email" placeholder="you@company.com"
              class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 pr-3.5 py-2.5 text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
          </div>
          <p id="emailErr" class="hidden mt-1.5 text-xs text-red-500" style="display:none">Please enter a valid work email</p>
        </div>


        <!-- Password with strength meter -->
        <div class="mb-5">
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Password</label>
          <div class="iw relative">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input id="password" type="password" autocomplete="new-password" placeholder="Min. 8 characters"
              class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 pr-10 py-2.5 text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
            <button type="button" id="pwdToggle" aria-label="Toggle password visibility"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
              <svg id="pEyeShow" style="width:18px;height:18px" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg id="pEyeHide" class="hidden" style="width:18px;height:18px" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <!-- Strength meter: 4 segments -->
          <div class="mt-2 grid grid-cols-4 gap-1.5">
            <div id="seg0" class="seg"></div>
            <div id="seg1" class="seg"></div>
            <div id="seg2" class="seg"></div>
            <div id="seg3" class="seg"></div>
          </div>
          <div class="flex items-center justify-between mt-1">
            <p id="strengthLabel" class="text-xs text-gray-400"></p>
            <p id="pwdErr" class="hidden text-xs text-red-500" style="display:none">Password is required</p>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-5">
          <label for="confirmPwd" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Confirm password</label>
          <div class="relative iw">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
            <input id="confirmPwd" type="password" autocomplete="new-password" placeholder="Re-enter your password"
              class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 pr-10 py-2.5 text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
            <!-- Match indicator -->
            <span id="matchIcon" class="absolute right-3 top-1/2 -translate-y-1/2 hidden">
              <!-- Green check -->
              <svg id="matchCheck" class="hidden" style="width:18px;height:18px;color:#22c55e" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
              <!-- Red X -->
              <svg id="matchX" class="hidden" style="width:18px;height:18px;color:#ef4444" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </span>
          </div>
          <p id="confirmErr" class="hidden mt-1.5 text-xs text-red-500" style="display:none">Passwords do not match</p>
        </div>

        <!-- Terms checkbox -->
        <div class="mb-6">
          <label class="flex items-start gap-3 cursor-pointer">
            <input id="terms" type="checkbox" class="mt-0.5 w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer flex-shrink-0" />
            <span class="text-sm text-gray-600 dark:text-gray-400 select-none">
              I agree to the
              <a href="#" class="text-blue-600 dark:text-blue-400 hover:underline font-medium">Terms of Service</a>
              and
              <a href="#" class="text-blue-600 dark:text-blue-400 hover:underline font-medium">Privacy Policy</a>
            </span>
          </label>
          <p id="termsErr" class="hidden mt-1.5 text-xs text-red-500 pl-7" style="display:none">You must agree to continue</p>
        </div>

        <!-- CTA button -->
        <button id="submitBtn" type="submit"
          class="w-full flex items-center justify-center gap-2 rounded-lg bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-sm font-semibold py-2.5 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 disabled:opacity-60 disabled:cursor-not-allowed">
          <svg id="btnSpinner" class="spin hidden" style="width:16px;height:16px" fill="none" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/>
            <path fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" class="opacity-75"/>
          </svg>
          <span id="btnTxt">Create account</span>
        </button>
      </form>

      <!-- Sign in link -->
      <p class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
        Already have an account?
        <a href="81-auth-login.html" class="text-blue-600 dark:text-blue-400 font-semibold hover:underline">Sign in</a>
      </p>
    </div><!-- /card -->
  </div><!-- /max-w-lg -->


<script>
/* ── Dark mode persistence ── */
(function () {
  if (localStorage.getItem('dm') === '1') document.documentElement.classList.add('dark');
})();
document.getElementById('darkToggle').addEventListener('click', function () {
  var on = document.documentElement.classList.toggle('dark');
  localStorage.setItem('dm', on ? '1' : '0');
});

/* ── Password eye toggle ── */
var pwd = document.getElementById('password');
document.getElementById('pwdToggle').addEventListener('click', function () {
  var show = pwd.type === 'password';
  pwd.type = show ? 'text' : 'password';
  document.getElementById('pEyeShow').classList.toggle('hidden', show);
  document.getElementById('pEyeHide').classList.toggle('hidden', !show);
});

/* ── Password strength meter ── */
var segs = [
  document.getElementById('seg0'), document.getElementById('seg1'),
  document.getElementById('seg2'), document.getElementById('seg3')
];
var labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
var labelColors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#22c55e'];
var segClasses = ['', 's-weak', 's-fair', 's-good', 's-strong'];

function getStrength(v) {
  var score = 0;
  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  return v.length === 0 ? 0 : Math.max(1, score);
}

pwd.addEventListener('input', function () {
  var v = pwd.value;
  var s = getStrength(v);
  segs.forEach(function (seg, i) {
    seg.className = 'seg';
    if (i < s) seg.classList.add(segClasses[s]);
  });
  var lbl = document.getElementById('strengthLabel');
  lbl.textContent = v.length ? labels[s] : '';
  lbl.style.color = v.length ? labelColors[s] : '';
  // also re-check confirm match
  checkMatch();
});

/* ── Confirm password real-time match ── */
var confirmInput = document.getElementById('confirmPwd');
var matchIcon    = document.getElementById('matchIcon');
var matchCheck   = document.getElementById('matchCheck');
var matchX       = document.getElementById('matchX');

function checkMatch() {
  var cv = confirmInput.value;
  if (!cv) {
    matchIcon.classList.add('hidden');
    matchCheck.classList.add('hidden');
    matchX.classList.add('hidden');
    return;
  }
  var matches = cv === pwd.value;
  matchIcon.classList.remove('hidden');
  matchCheck.classList.toggle('hidden', !matches);
  matchX.classList.toggle('hidden', matches);
}
confirmInput.addEventListener('input', checkMatch);

/* ── Validation helpers ── */
var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
function showErr(el, show, msg) {
  el.style.display = show ? 'block' : 'none';
  el.classList.toggle('hidden', !show);
  if (msg) el.textContent = msg;
}

function validateName()  { var v = document.getElementById('fullName').value.trim(); showErr(document.getElementById('nameErr'), !v); return !!v; }
function validateEmail() { var v = document.getElementById('email').value.trim(); var ok = !!v && emailRe.test(v); showErr(document.getElementById('emailErr'), !ok); return ok; }
function validatePwd()   { var v = pwd.value; showErr(document.getElementById('pwdErr'), !v); return !!v; }
function validateConfirm() {
  var cv = confirmInput.value; var ok = !!cv && cv === pwd.value;
  showErr(document.getElementById('confirmErr'), !ok, cv ? 'Passwords do not match' : 'Please confirm your password');
  return ok;
}
function validateTerms() { var ok = document.getElementById('terms').checked; showErr(document.getElementById('termsErr'), !ok); return ok; }

/* Blur hooks */
document.getElementById('fullName').addEventListener('blur', validateName);
document.getElementById('email').addEventListener('blur', validateEmail);
pwd.addEventListener('blur', validatePwd);
confirmInput.addEventListener('blur', validateConfirm);

/* ── Form submit ── */
document.getElementById('regForm').addEventListener('submit', function (e) {
  e.preventDefault();
  var ok = validateName() & validateEmail() & validatePwd() & validateConfirm() & validateTerms();
  if (!ok) return;
  var btn = document.getElementById('submitBtn');
  var sp  = document.getElementById('btnSpinner');
  var tx  = document.getElementById('btnTxt');
  btn.disabled = true;
  sp.classList.remove('hidden');
  tx.textContent = 'Creating account…';
  setTimeout(function () { tx.textContent = '✓ Account created! Redirecting…'; }, 1800);
});
</script>
</body>
</html>
