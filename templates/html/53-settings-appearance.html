<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#465fff" />
  <meta name="description" content="Production-ready Appearance HTML dashboard template with responsive TailAdmin-style layout, dark mode, command palette, actions, loaders, and polished UI states." />
  <title>Appearance — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-slideDown {
      animation: slideDown 0.2s ease-out;
    }
    .sidebar-text {
      transition: opacity 0.2s ease-in-out;
    }
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100">

<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar Container -->
  <div id="sidebar-container"></div>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">
<div class="mb-2">
      <h1 class="text-xl font-bold text-gray-900">Appearance</h1>
      <p class="text-sm text-gray-500 mt-1">Customize how the interface looks and feels</p>
    </div>

    <!-- Theme Selector -->
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <h2 class="font-semibold text-gray-800 text-sm mb-4">Theme</h2>
      <div class="grid grid-cols-3 gap-3">
        <label class="cursor-pointer">
          <input type="radio" name="theme" value="light" checked class="sr-only" />
          <div class="border-2 border-blue-500 rounded-xl overflow-hidden">
            <div class="bg-white p-3 h-20 flex gap-1">
              <div class="w-8 h-full bg-gray-100 rounded-lg flex flex-col gap-1 p-1">
                <div class="h-1.5 bg-gray-300 rounded"></div>
                <div class="h-1 bg-gray-200 rounded"></div>
                <div class="h-1 bg-gray-200 rounded"></div>
              </div>
              <div class="flex-1 flex flex-col gap-1">
                <div class="h-3 bg-gray-100 rounded w-full"></div>
                <div class="flex-1 bg-gray-50 rounded"></div>
              </div>
            </div>
            <div class="bg-blue-50 px-3 py-1.5 flex items-center gap-1">
              <span class="w-3 h-3 rounded-full bg-blue-500"></span>
              <p class="text-xs font-medium text-blue-700">Light</p>
            </div>
          </div>
        </label>
        <label class="cursor-pointer">
          <input type="radio" name="theme" value="dark" class="sr-only" />
          <div class="border-2 border-gray-200 rounded-xl overflow-hidden hover:border-gray-300">
            <div class="bg-gray-900 p-3 h-20 flex gap-1">
              <div class="w-8 h-full bg-gray-800 rounded-lg flex flex-col gap-1 p-1">
                <div class="h-1.5 bg-gray-600 rounded"></div>
                <div class="h-1 bg-gray-700 rounded"></div>
                <div class="h-1 bg-gray-700 rounded"></div>
              </div>
              <div class="flex-1 flex flex-col gap-1">
                <div class="h-3 bg-gray-800 rounded w-full"></div>
                <div class="flex-1 bg-gray-800 rounded"></div>
              </div>
            </div>
            <div class="bg-gray-100 px-3 py-1.5 flex items-center gap-1">
              <span class="w-3 h-3 rounded-full bg-gray-700"></span>
              <p class="text-xs font-medium text-gray-700">Dark</p>
            </div>
          </div>
        </label>
        <label class="cursor-pointer">
          <input type="radio" name="theme" value="system" class="sr-only" />
          <div class="border-2 border-gray-200 rounded-xl overflow-hidden hover:border-gray-300">
            <div class="h-20 flex">
              <div class="flex-1 bg-white p-2 flex gap-0.5">
                <div class="w-4 h-full bg-gray-100 rounded-l-lg"></div>
                <div class="flex-1 bg-gray-50 rounded-r-lg"></div>
              </div>
              <div class="flex-1 bg-gray-900 p-2 flex gap-0.5">
                <div class="w-4 h-full bg-gray-800 rounded-l-lg"></div>
                <div class="flex-1 bg-gray-800 rounded-r-lg"></div>
              </div>
            </div>
            <div class="bg-gray-100 px-3 py-1.5 flex items-center gap-1">
              <span class="w-3 h-3 rounded-full bg-gradient-to-r from-white to-gray-700 border border-gray-300"></span>
              <p class="text-xs font-medium text-gray-700">System</p>
            </div>
          </div>
        </label>
      </div>
    </div>

    <!-- Accent Color -->
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <h2 class="font-semibold text-gray-800 text-sm mb-4">Accent Color</h2>
      <div class="flex flex-wrap gap-3">
        <button type="button" onclick="setAccent(this,'bg-blue-500','Blue')" class="w-8 h-8 rounded-full bg-blue-500 ring-2 ring-offset-2 ring-blue-500" title="Blue"></button>
        <button type="button" onclick="setAccent(this,'bg-purple-500','Purple')" class="w-8 h-8 rounded-full bg-purple-500 hover:ring-2 hover:ring-offset-2 hover:ring-purple-500" title="Purple"></button>
        <button type="button" onclick="setAccent(this,'bg-green-500','Green')" class="w-8 h-8 rounded-full bg-green-500 hover:ring-2 hover:ring-offset-2 hover:ring-green-500" title="Green"></button>
        <button type="button" onclick="setAccent(this,'bg-orange-500','Orange')" class="w-8 h-8 rounded-full bg-orange-500 hover:ring-2 hover:ring-offset-2 hover:ring-orange-500" title="Orange"></button>
        <button type="button" onclick="setAccent(this,'bg-red-500','Red')" class="w-8 h-8 rounded-full bg-red-500 hover:ring-2 hover:ring-offset-2 hover:ring-red-500" title="Red"></button>
        <button type="button" onclick="setAccent(this,'bg-gray-500','Gray')" class="w-8 h-8 rounded-full bg-gray-500 hover:ring-2 hover:ring-offset-2 hover:ring-gray-500" title="Gray"></button>
      </div>
      <p class="text-xs text-gray-400 mt-2">Selected: <span id="accent-name">Blue</span></p>
    </div>

    <!-- Font & Layout -->
    <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
      <h2 class="font-semibold text-gray-800 text-sm">Typography & Layout</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1">Font Family</label>
          <select class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option selected>Inter (default)</option>
            <option>Geist Sans</option>
            <option>DM Sans</option>
            <option>Nunito</option>
            <option>System UI</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1">Sidebar Layout</label>
          <select class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option selected>Fixed</option>
            <option>Floating</option>
            <option>Collapsed by default</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1">Density</label>
          <div class="flex gap-2">
            <button type="button" onclick="setDensity(this)" class="flex-1 px-3 py-2 text-xs border-2 border-blue-500 text-blue-600 rounded-lg font-medium">Compact</button>
            <button type="button" onclick="setDensity(this)" class="flex-1 px-3 py-2 text-xs border border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50">Default</button>
            <button type="button" onclick="setDensity(this)" class="flex-1 px-3 py-2 text-xs border border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50">Comfortable</button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1">Code Block Theme</label>
          <select class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option selected>GitHub Light</option>
            <option>GitHub Dark</option>
            <option>One Dark Pro</option>
            <option>Monokai</option>
            <option>Dracula</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Live Preview -->
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <h2 class="font-semibold text-gray-800 text-sm mb-4">Live Preview</h2>
      <div class="bg-gray-50 rounded-xl p-5 space-y-4">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white text-xs font-bold">M</div>
          <div>
            <p class="font-bold text-gray-900 text-sm">mtverse Dashboard</p>
            <p class="text-xs text-gray-500">Sample navigation header</p>
          </div>
        </div>
        <div class="flex gap-3 flex-wrap">
          <button type="button" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg">Primary Button</button>
          <button class="px-4 py-2 border border-gray-200 text-gray-700 text-sm rounded-lg hover:bg-gray-100">Secondary</button>
          <span class="px-2 py-0.5 bg-green-100 text-green-700 text-xs rounded-full font-medium self-center">Active</span>
          <span class="px-2 py-0.5 bg-red-100 text-red-700 text-xs rounded-full font-medium self-center">Error</span>
        </div>
        <div class="bg-gray-900 rounded-lg p-3">
          <pre class="text-green-400 text-xs"><code>const greeting = "Hello, mtverse!";</code></pre>
        </div>
        <div class="flex gap-3">
          <div class="flex-1 bg-white rounded-lg border border-gray-200 p-3">
            <p class="text-xs font-semibold text-gray-600 mb-1">Total Sales</p>
            <p class="text-xl font-bold text-gray-900">$12,450</p>
          </div>
          <div class="flex-1 bg-white rounded-lg border border-gray-200 p-3">
            <p class="text-xs font-semibold text-gray-600 mb-1">Templates</p>
            <p class="text-xl font-bold text-gray-900">47</p>
          </div>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 pb-4">
      <button class="px-4 py-2 border border-gray-200 text-sm text-gray-700 rounded-lg hover:bg-gray-50">Reset to Defaults</button>
      <button type="button" class="px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">Save Appearance</button>
    </div>
      </div>
    </main>
  </div>
</div>

<!-- Common Components -->
<script src="common-loader.js"></script>
<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>

</body>
</html>
