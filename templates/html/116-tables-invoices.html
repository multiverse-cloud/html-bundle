<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Invoices — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    tr:hover .row-actions{opacity:1!important;}
    .row-actions{opacity:0;transition:opacity .15s;}
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100" style="font-family:'Outfit',sans-serif;">
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>
<div class="flex h-screen overflow-hidden">
  <div id="sidebar-container"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="header-container"></div>
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">

        <!-- Page header -->
        <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Invoices</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Manage, send, and track all your invoices</p>
          </div>
          <div class="flex flex-wrap gap-2">
            <button type="button" onclick="downloadAll()" class="inline-flex items-center gap-1.5 rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition dark:border-gray-700 dark:bg-white/[.03] dark:text-gray-300">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download All
            </button>
            <button type="button" class="inline-flex items-center gap-1.5 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 transition shadow-sm">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Create Invoice
            </button>
          </div>
        </div>

        <!-- Summary stat cards -->
        <div class="mb-6 grid grid-cols-2 gap-4 lg:grid-cols-4">
          <div class="rounded-2xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-white/[.03]">
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Total</p>
            <p class="mt-1.5 text-2xl font-bold text-gray-900 dark:text-white">$37,490</p>
            <p class="mt-0.5 text-xs text-gray-400">8 invoices</p>
          </div>
          <div class="rounded-2xl border border-green-200 bg-green-50 p-4 dark:border-green-900/50 dark:bg-green-500/10">
            <p class="text-xs font-medium text-green-600 uppercase tracking-wide dark:text-green-400">Paid</p>
            <p class="mt-1.5 text-2xl font-bold text-green-700 dark:text-green-300">$22,990</p>
            <p class="mt-0.5 text-xs text-green-500">3 invoices</p>
          </div>
          <div class="rounded-2xl border border-amber-200 bg-amber-50 p-4 dark:border-amber-900/50 dark:bg-amber-500/10">
            <p class="text-xs font-medium text-amber-600 uppercase tracking-wide dark:text-amber-400">Outstanding</p>
            <p class="mt-1.5 text-2xl font-bold text-amber-700 dark:text-amber-300">$11,500</p>
            <p class="mt-0.5 text-xs text-amber-500">3 invoices</p>
          </div>
          <div class="rounded-2xl border border-red-200 bg-red-50 p-4 dark:border-red-900/50 dark:bg-red-500/10">
            <p class="text-xs font-medium text-red-600 uppercase tracking-wide dark:text-red-400">Overdue</p>
            <p class="mt-1.5 text-2xl font-bold text-red-700 dark:text-red-300">$3,000</p>
            <p class="mt-0.5 text-xs text-red-500">1 invoice</p>
          </div>
        </div>

        <div class="rounded-2xl border border-gray-200 bg-white overflow-hidden dark:border-gray-800 dark:bg-white/[.03]">
          <!-- Filter tabs -->
          <div class="px-5 py-3 border-b border-gray-200 dark:border-gray-800 flex flex-wrap items-center gap-3">
            <div class="flex gap-1">
              <button class="filter-tab active" data-status="All" onclick="setFilter(this)">All</button>
              <button class="filter-tab" data-status="Draft" onclick="setFilter(this)">Draft</button>
              <button class="filter-tab" data-status="Sent" onclick="setFilter(this)">Sent</button>
              <button class="filter-tab" data-status="Paid" onclick="setFilter(this)">Paid</button>
              <button class="filter-tab" data-status="Overdue" onclick="setFilter(this)">Overdue</button>
            </div>
            <div class="relative ml-auto min-w-[180px]">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <input type="text" id="searchInput" placeholder="Search invoices…" oninput="filterTable()"
                class="w-full pl-8 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500" />
            </div>
          </div>

          <!-- Table -->
          <div class="overflow-x-auto">
            <table class="w-full text-sm" id="invoicesTable">
              <thead>
                <tr class="border-b border-gray-200 dark:border-gray-800 bg-gray-50/80 dark:bg-white/[.02]">
                  <th class="px-5 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider cursor-pointer hover:text-blue-600" onclick="sortTable('id')">Invoice # ↕</th>
                  <th class="px-5 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider">Client</th>
                  <th class="px-5 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider cursor-pointer hover:text-blue-600" onclick="sortTable('amount')">Amount ↕</th>
                  <th class="px-5 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider cursor-pointer hover:text-blue-600" onclick="sortTable('issued')">Issue Date ↕</th>
                  <th class="px-5 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider cursor-pointer hover:text-blue-600" onclick="sortTable('due')">Due Date ↕</th>
                  <th class="px-5 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider">Status</th>
                  <th class="px-5 py-3 text-right font-semibold text-xs text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
              </thead>
              <tbody id="invoicesBody"></tbody>
              <tfoot id="invoicesFoot"></tfoot>
            </table>
          </div>

          <div id="emptyState" class="hidden px-5 py-14 text-center">
            <svg class="mx-auto mb-3 text-gray-300" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p class="text-gray-500 dark:text-gray-400 font-medium">No invoices found</p>
            <button onclick="clearFilters()" class="mt-2 text-sm text-blue-600 hover:underline">Clear filters</button>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<style>
.filter-tab {
  padding: .35rem .85rem;
  border-radius: .5rem;
  font-size: .83rem;
  font-weight: 500;
  color: #64748b;
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all .12s;
}
.filter-tab:hover { background: #f1f5f9; color: #374151; }
html.dark .filter-tab:hover { background: #1e293b; color: #e2e8f0; }
.filter-tab.active { background: #eff6ff; color: #2563eb; font-weight: 600; }
html.dark .filter-tab.active { background: #1e3a5f; color: #60a5fa; }
</style>

<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>
<script>
const invoices = [
  { id:'INV-0041', client:'Acme Corp',         avatar:'AC', color:'#7c3aed', amount:8500,  issued:'May 1, 2025',   due:'May 31, 2025',  status:'Paid'    },
  { id:'INV-0040', client:'TechGlobal LLC',     avatar:'TG', color:'#0891b2', amount:3200,  issued:'May 5, 2025',   due:'Jun 4, 2025',   status:'Sent'    },
  { id:'INV-0039', client:'Startup Co.',        avatar:'SC', color:'#16a34a', amount:1200,  issued:'May 10, 2025',  due:'May 24, 2025',  status:'Overdue' },
  { id:'INV-0038', client:'Design Studio',      avatar:'DS', color:'#b45309', amount:4750,  issued:'Apr 20, 2025',  due:'May 20, 2025',  status:'Paid'    },
  { id:'INV-0037', client:'Enterprise Inc.',    avatar:'EI', color:'#be123c', amount:12000, issued:'Apr 15, 2025',  due:'May 15, 2025',  status:'Paid'    },
  { id:'INV-0036', client:'Media House',        avatar:'MH', color:'#1d4ed8', amount:3840,  issued:'May 15, 2025',  due:'Jun 14, 2025',  status:'Draft'   },
  { id:'INV-0035', client:'Retail Brand',       avatar:'RB', color:'#0d9488', amount:2500,  issued:'May 18, 2025',  due:'Jun 17, 2025',  status:'Sent'    },
  { id:'INV-0034', client:'Cloud Systems',      avatar:'CS', color:'#8b5cf6', amount:1500,  issued:'May 20, 2025',  due:'Jun 19, 2025',  status:'Draft'   },
];

const statusClasses = {
  'Paid':    'bg-green-100 text-green-700 dark:bg-green-500/15 dark:text-green-400',
  'Sent':    'bg-blue-100 text-blue-700 dark:bg-blue-500/15 dark:text-blue-400',
  'Draft':   'bg-gray-100 text-gray-600 dark:bg-gray-500/10 dark:text-gray-400',
  'Overdue': 'bg-red-100 text-red-700 dark:bg-red-500/15 dark:text-red-400',
};

let currentFilter = 'All';
let sortKey = 'id', sortAsc = false;

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return invoices.filter(inv =>
    (currentFilter === 'All' || inv.status === currentFilter) &&
    (!q || inv.id.toLowerCase().includes(q) || inv.client.toLowerCase().includes(q))
  );
}

function renderTable() {
  const data = getFiltered();
  const tbody = document.getElementById('invoicesBody');
  const tfoot = document.getElementById('invoicesFoot');
  const empty = document.getElementById('emptyState');
  if (data.length === 0) { tbody.innerHTML = ''; tfoot.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  // Sort
  const sorted = [...data].sort((a,b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey === 'amount') { av = a.amount; bv = b.amount; }
    return (av < bv ? -1 : av > bv ? 1 : 0) * (sortAsc ? 1 : -1);
  });

  tbody.innerHTML = sorted.map(inv => `
    <tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-white/[.02] transition group">
      <td class="px-5 py-3.5 font-mono text-xs font-semibold text-gray-700 dark:text-gray-300">${inv.id}</td>
      <td class="px-5 py-3.5">
        <div class="flex items-center gap-2.5">
          <div class="h-7 w-7 rounded-lg flex items-center justify-center text-xs font-bold text-white flex-shrink-0" style="background:${inv.color}">${inv.avatar}</div>
          <span class="font-medium text-gray-800 dark:text-gray-200">${inv.client}</span>
        </div>
      </td>
      <td class="px-5 py-3.5 font-semibold text-gray-900 dark:text-white">$${inv.amount.toLocaleString()}</td>
      <td class="px-5 py-3.5 text-sm text-gray-500 dark:text-gray-400">${inv.issued}</td>
      <td class="px-5 py-3.5 text-sm${inv.status==='Overdue'?' text-red-600 dark:text-red-400 font-semibold':' text-gray-500 dark:text-gray-400'}">${inv.due}</td>
      <td class="px-5 py-3.5">
        <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-semibold ${statusClasses[inv.status]}">${inv.status}</span>
      </td>
      <td class="px-5 py-3.5 text-right">
        <div class="row-actions inline-flex items-center gap-1">
          <button onclick="viewPDF('${inv.id}')" class="rounded-lg px-2.5 py-1.5 text-xs font-medium text-blue-600 hover:bg-blue-50 dark:text-blue-400 dark:hover:bg-blue-500/10 transition">PDF</button>
          ${inv.status !== 'Paid' ? `<button onclick="sendReminder('${inv.id}')" class="rounded-lg px-2.5 py-1.5 text-xs font-medium text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800 transition">Remind</button>` : ''}
          ${inv.status !== 'Paid' ? `<button onclick="markPaid('${inv.id}')" class="rounded-lg px-2.5 py-1.5 text-xs font-medium text-green-600 hover:bg-green-50 dark:text-green-400 dark:hover:bg-green-500/10 transition">Mark Paid</button>` : ''}
        </div>
      </td>
    </tr>
  `).join('');

  // Total row
  const total = sorted.reduce((sum, inv) => sum + inv.amount, 0);
  tfoot.innerHTML = `
    <tr class="border-t-2 border-gray-200 dark:border-gray-700 bg-gray-50/80 dark:bg-white/[.02]">
      <td colspan="2" class="px-5 py-3.5 text-sm font-semibold text-gray-700 dark:text-gray-300">${sorted.length} invoice${sorted.length!==1?'s':''}</td>
      <td class="px-5 py-3.5 text-base font-bold text-gray-900 dark:text-white">$${total.toLocaleString()}</td>
      <td colspan="4" class="px-5 py-3.5 text-xs text-gray-400">Total across ${sorted.length} invoice${sorted.length!==1?'s':''}</td>
    </tr>
  `;
}

function setFilter(btn) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.status;
  renderTable();
}

function filterTable() { renderTable(); }

function clearFilters() {
  document.getElementById('searchInput').value = '';
  currentFilter = 'All';
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.filter-tab[data-status="All"]').classList.add('active');
  renderTable();
}

function sortTable(key) {
  if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = false; }
  renderTable();
}

function viewPDF(id) { showToast(`Opening PDF for ${id}…`); }
function sendReminder(id) { showToast(`Reminder sent for ${id}`); }
function markPaid(id) {
  const inv = invoices.find(i => i.id === id);
  if (inv) { inv.status = 'Paid'; renderTable(); showToast(`${id} marked as paid`); }
}
function downloadAll() { showToast('Downloading all invoices as ZIP…'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;animation:toastIn .25s ease-out both;background:#1e293b;color:#f8fafc;font-size:.85rem;font-weight:500;padding:.65rem 1.1rem;border-radius:.75rem;box-shadow:0 8px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:.6rem;';
  t.innerHTML = `<svg width="15" height="15" fill="none" stroke="#4ade80" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${msg}`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

renderTable();
</script>
</body>
</html>
