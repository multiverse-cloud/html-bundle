<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#465fff" />
  <meta name="description" content="Production-ready Onboarding Form HTML dashboard template with responsive TailAdmin-style layout, dark mode, command palette, actions, loaders, and polished UI states." />
  <title>Onboarding Form — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-slideDown {
      animation: slideDown 0.2s ease-out;
    }
    .sidebar-text {
      transition: opacity 0.2s ease-in-out;
    }
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100">

<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar Container -->
  <div id="sidebar-container"></div>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">
<div class="mb-6"><h1 class="text-2xl font-bold text-gray-900">Onboarding</h1><p class="text-sm text-gray-500 mt-1">Complete your workspace setup in a few steps</p></div>
      <!-- Steps -->
      <div class="flex items-center gap-2 mb-8">
        <div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold">1</div><span class="text-sm font-medium text-blue-600">Profile</span></div>
        <div class="flex-1 h-0.5 bg-blue-200"></div>
        <div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-blue-200 text-blue-600 flex items-center justify-center text-sm font-bold">2</div><span class="text-sm text-gray-400">Workspace</span></div>
        <div class="flex-1 h-0.5 bg-gray-200"></div>
        <div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-sm font-bold">3</div><span class="text-sm text-gray-400">Invite</span></div>
        <div class="flex-1 h-0.5 bg-gray-200"></div>
        <div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-sm font-bold">4</div><span class="text-sm text-gray-400">Done</span></div>
      </div>
      <div class="max-w-xl">
        <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
          <h2 class="font-semibold text-gray-900">Step 1: Your Profile</h2>
          <div class="flex items-center gap-4 mb-2"><div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xl font-bold">JD</div><button class="text-sm text-blue-600 border border-blue-200 rounded-lg px-3 py-1.5 hover:bg-blue-50 transition">Upload Photo</button></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-xs font-medium text-gray-700 mb-1">First Name</label><input type="text" placeholder="Jane" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" /></div>
            <div><label class="block text-xs font-medium text-gray-700 mb-1">Last Name</label><input type="text" placeholder="Doe" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" /></div>
          </div>
          <div><label class="block text-xs font-medium text-gray-700 mb-1">Job Title</label><input type="text" placeholder="e.g. Product Manager" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" /></div>
          <div><label class="block text-xs font-medium text-gray-700 mb-1">Department</label><select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700"><option>Engineering</option><option>Design</option><option>Marketing</option><option>Sales</option><option>Operations</option></select></div>
          <div><label class="block text-xs font-medium text-gray-700 mb-1">Bio (optional)</label><textarea rows="3" placeholder="A short bio..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea></div>
          <div class="flex gap-3 pt-2"><button type="button" class="flex-1 bg-blue-600 text-white text-sm py-2 rounded-lg hover:bg-blue-700 transition">Continue →</button></div>
        </div>
      </div>
      </div>
    </main>
  </div>
</div>

<!-- Common Components -->
<script src="common-loader.js"></script>
<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>

</body>
</html>
