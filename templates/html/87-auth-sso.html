<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="Sign in with your company SSO provider — mtverse" />
  <title>Sign in with SSO — mtverse</title>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', system-ui, sans-serif; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .anim-in { animation: fadeSlideUp .35s ease-out both; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .7s linear infinite; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-100 min-h-screen flex items-center justify-center px-4">

  <!-- Dark mode toggle -->
  <button onclick="toggleDark()" title="Toggle dark mode"
    class="fixed top-4 right-4 z-50 inline-flex items-center gap-1.5 rounded-full border border-gray-200 bg-white px-3 py-1.5 text-xs font-semibold text-gray-600 shadow-sm hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 transition">
    <span id="darkIcon">🌙</span><span id="darkLabel">Dark</span>
  </button>

  <div class="w-full max-w-[440px] anim-in">
    <!-- Logo / Brand -->
    <div class="mb-8 flex flex-col items-center gap-3">
      <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-blue-600 to-blue-700 shadow-lg shadow-blue-600/30 text-white font-black text-2xl select-none">M</div>
      <span class="text-sm font-semibold text-gray-500 dark:text-gray-400 tracking-wide">mtverse</span>
    </div>

    <!-- Card -->
    <div class="rounded-3xl border border-gray-200 bg-white p-8 shadow-xl shadow-gray-200/60 dark:border-gray-800 dark:bg-gray-900 dark:shadow-black/30">

      <!-- Default state -->
      <div id="state-default">
        <div class="mb-7 text-center">
          <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Sign in with SSO</h1>
          <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Enter your company email to get started</p>
        </div>

        <form onsubmit="handleSSOSubmit(event)" class="grid gap-4">
          <div class="grid gap-1.5">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300" for="ssoEmail">Work email</label>
            <input
              id="ssoEmail"
              type="email"
              placeholder="you@yourcompany.com"
              autocomplete="email"
              oninput="detectDomain(this.value)"
              class="h-11 w-full rounded-xl border border-gray-200 bg-white px-4 text-sm text-gray-900 outline-none transition placeholder:text-gray-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-blue-500"
            />
          </div>

          <!-- Domain detection hint -->
          <div id="domainHint" class="hidden rounded-lg bg-blue-50 px-3.5 py-2.5 text-sm text-blue-700 dark:bg-blue-500/10 dark:text-blue-300">
            <span id="domainHintText"></span>
          </div>

          <button type="submit" id="ssoBtn"
            class="mt-1 inline-flex h-11 w-full items-center justify-center gap-2 rounded-xl bg-blue-600 text-sm font-semibold text-white shadow-lg shadow-blue-600/25 transition hover:bg-blue-700 active:scale-[.98] disabled:opacity-60 disabled:cursor-not-allowed">
            <span id="ssoBtnText">Continue with SSO</span>
          </button>
        </form>

        <!-- Divider -->
        <div class="my-5 flex items-center gap-3">
          <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
          <span class="text-xs font-medium text-gray-400">or</span>
          <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
        </div>

        <div class="grid gap-2.5">
          <p class="text-center text-xs text-gray-400 dark:text-gray-500">Sign in with a provider</p>
          <button type="button" onclick="ssoProvider('google')"
            class="inline-flex h-10 items-center justify-center gap-2.5 rounded-xl border border-gray-200 bg-white px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 transition dark:border-gray-700 dark:bg-gray-800 dark:text-gray-200 dark:hover:bg-gray-700">
            <svg class="h-4 w-4" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google Workspace
          </button>
          <button type="button" onclick="ssoProvider('microsoft')"
            class="inline-flex h-10 items-center justify-center gap-2.5 rounded-xl border border-gray-200 bg-white px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 transition dark:border-gray-700 dark:bg-gray-800 dark:text-gray-200 dark:hover:bg-gray-700">
            <svg class="h-4 w-4" viewBox="0 0 23 23"><path fill="#f3f3f3" d="M0 0h23v23H0z"/><path fill="#f35325" d="M1 1h10v10H1z"/><path fill="#81bc06" d="M12 1h10v10H12z"/><path fill="#05a6f0" d="M1 12h10v10H1z"/><path fill="#ffba08" d="M12 12h10v10H12z"/></svg>
            Continue with Microsoft Entra
          </button>
          <button type="button" onclick="ssoProvider('okta')"
            class="inline-flex h-10 items-center justify-center gap-2.5 rounded-xl border border-gray-200 bg-white px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 transition dark:border-gray-700 dark:bg-gray-800 dark:text-gray-200 dark:hover:bg-gray-700">
            <svg class="h-4 w-4 text-blue-600 fill-current" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="5" fill="white"/></svg>
            Continue with Okta
          </button>
        </div>
      </div>

      <!-- Loading state -->
      <div id="state-loading" class="hidden flex-col items-center py-8 gap-4">
        <svg class="spin h-8 w-8 text-blue-600" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10"/></svg>
        <div class="text-center">
          <p class="font-semibold text-gray-900 dark:text-white" id="loadingMsg">Redirecting to SSO provider…</p>
          <p class="mt-1 text-sm text-gray-500 dark:text-gray-400" id="loadingDomain">Connecting securely</p>
        </div>
      </div>

      <!-- Links -->
      <div id="state-links" class="mt-6 grid gap-2 text-center">
        <a href="81-auth-login.html" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition">← Back to regular sign in</a>
        <p class="text-sm text-gray-500 dark:text-gray-400">
          Don't have an account?
          <a href="82-auth-register.html" class="font-semibold text-blue-600 hover:underline dark:text-blue-400">Sign up</a>
        </p>
      </div>
    </div>

    <p class="mt-5 text-center text-xs text-gray-400 dark:text-gray-600">© 2025 mtverse. All rights reserved.</p>
  </div>

  <script>
    // Dark mode
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    let dark = localStorage.getItem('dark') === '1' || (localStorage.getItem('dark') === null && prefersDark);
    function applyDark() {
      document.documentElement.classList.toggle('dark', dark);
      const icon = document.getElementById('darkIcon');
      const label = document.getElementById('darkLabel');
      icon.textContent = dark ? '☀️' : '🌙';
      label.textContent = dark ? 'Light' : 'Dark';
    }
    applyDark();
    function toggleDark() { dark = !dark; localStorage.setItem('dark', dark ? '1' : '0'); applyDark(); }

    // Domain detection
    const knownDomains = {
      'acmecorp.com': 'Acme Corp',
      'techglobal.io': 'TechGlobal',
      'startup.co': 'Startup Co',
      'enterprise.net': 'Enterprise Inc',
    };
    function detectDomain(email) {
      const domain = email.split('@')[1] || '';
      const hint = document.getElementById('domainHint');
      const hintText = document.getElementById('domainHintText');
      if (domain && domain.includes('.')) {
        const name = knownDomains[domain] || domain;
        hintText.textContent = `Signing you in via ${name} SSO →`;
        hint.classList.remove('hidden');
      } else {
        hint.classList.add('hidden');
      }
    }

    function handleSSOSubmit(e) {
      e.preventDefault();
      const email = document.getElementById('ssoEmail').value.trim();
      if (!email || !email.includes('@')) return;
      const domain = email.split('@')[1] || email;
      showLoading(domain);
    }

    function ssoProvider(name) {
      const labels = { google: 'Google Workspace', microsoft: 'Microsoft Entra', okta: 'Okta' };
      showLoading(labels[name] || name);
    }

    function showLoading(provider) {
      document.getElementById('state-default').classList.add('hidden');
      document.getElementById('state-links').classList.add('hidden');
      const loadingEl = document.getElementById('state-loading');
      loadingEl.classList.remove('hidden');
      loadingEl.classList.add('flex');
      document.getElementById('loadingMsg').textContent = `Redirecting to ${provider}…`;
      document.getElementById('loadingDomain').textContent = 'Connecting securely via SAML 2.0';
      // Simulate redirect
      setTimeout(() => {
        loadingEl.querySelector('p:last-child') && (document.getElementById('loadingDomain').textContent = 'You would be redirected to your SSO provider.');
      }, 2000);
    }
  </script>
</body>
</html>
