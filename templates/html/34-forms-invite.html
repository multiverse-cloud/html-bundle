<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#465fff" />
  <meta name="description" content="Production-ready Invite Team HTML dashboard template with responsive TailAdmin-style layout, dark mode, command palette, actions, loaders, and polished UI states." />
  <title>Invite Team — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-slideDown {
      animation: slideDown 0.2s ease-out;
    }
    .sidebar-text {
      transition: opacity 0.2s ease-in-out;
    }
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100">

<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar Container -->
  <div id="sidebar-container"></div>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">
<div class="mb-6"><h1 class="text-2xl font-bold text-gray-900">Invite Team Members</h1><p class="text-sm text-gray-500 mt-1">Send invitations to add colleagues to your workspace</p></div>
      <div class="max-w-xl space-y-5">
        <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
          <h2 class="font-semibold text-gray-900">Send Invitations</h2>
          <div id="invite-list" class="space-y-3">
            <div class="flex gap-2"><input type="email" placeholder="colleague@company.com" class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" /><select class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-700 focus:outline-none"><option>Member</option><option>Admin</option><option>Viewer</option></select></div>
            <div class="flex gap-2"><input type="email" placeholder="colleague@company.com" class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" /><select class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-700 focus:outline-none"><option>Member</option><option>Admin</option><option>Viewer</option></select></div>
            <div class="flex gap-2"><input type="email" placeholder="colleague@company.com" class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" /><select class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-700 focus:outline-none"><option>Member</option><option>Admin</option><option>Viewer</option></select></div>
          </div>
          <button class="text-sm text-blue-600 hover:underline">+ Add another</button>
          <div><label class="block text-xs font-medium text-gray-700 mb-1">Personal Message (optional)</label><textarea rows="3" placeholder="Welcome to the team! We're excited to have you." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea></div>
          <div class="flex gap-3"><button type="button" class="bg-blue-600 text-white text-sm px-5 py-2 rounded-lg hover:bg-blue-700 transition">Send Invitations</button><button class="border border-gray-300 text-gray-700 text-sm px-5 py-2 rounded-lg hover:bg-gray-50 transition">Cancel</button></div>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-900 mb-3">Invite Link</h2>
          <p class="text-xs text-gray-500 mb-3">Share this link for anyone to join your workspace.</p>
          <div class="flex gap-2"><input type="text" value="https://app.mtverse.io/invite/abc123xyz" readonly class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 text-gray-500 focus:outline-none" /><button class="text-sm bg-gray-100 text-gray-700 px-3 py-2 rounded-lg hover:bg-gray-200 transition">Copy</button></div>
        </div>
      </div>
      </div>
    </main>
  </div>
</div>

<!-- Common Components -->
<script src="common-loader.js"></script>
<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>

</body>
</html>
