<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#465fff" />
  <meta name="description" content="Production-ready Users HTML dashboard template with responsive TailAdmin-style layout, dark mode, command palette, actions, loaders, and polished UI states." />
  <title>Users — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-slideDown {
      animation: slideDown 0.2s ease-out;
    }
    .sidebar-text {
      transition: opacity 0.2s ease-in-out;
    }
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100">

<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar Container -->
  <div id="sidebar-container"></div>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">
<div class="mb-6 flex items-center justify-between">
        <div><h1 class="text-2xl font-bold text-gray-900">Users</h1><p class="text-sm text-gray-500 mt-1">Manage team members and permissions</p></div>
        <button type="button" class="bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700 transition">+ Invite User</button>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="px-5 py-4 border-b border-gray-200 flex items-center gap-3">
          <input type="text" placeholder="Search users..." class="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <select class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none text-gray-700">
            <option>All Roles</option><option>Admin</option><option>Member</option><option>Viewer</option>
          </select>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="text-left px-5 py-3 font-semibold text-gray-600">User</th>
              <th class="text-left px-5 py-3 font-semibold text-gray-600">Role</th>
              <th class="text-left px-5 py-3 font-semibold text-gray-600">Status</th>
              <th class="text-left px-5 py-3 font-semibold text-gray-600">Joined</th>
              <th class="text-left px-5 py-3 font-semibold text-gray-600">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <tr class="hover:bg-gray-50"><td class="px-5 py-3 flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-bold">SM</div><div><p class="font-medium text-gray-900">Sarah Mitchell</p><p class="text-xs text-gray-400">sarah@company.com</p></div></td><td class="px-5 py-3 text-gray-600">Admin</td><td class="px-5 py-3"><span class="px-2 py-0.5 rounded-full text-xs bg-green-100 text-green-700">Active</span></td><td class="px-5 py-3 text-gray-400">Jan 12, 2026</td><td class="px-5 py-3"><button class="text-blue-600 hover:underline text-xs mr-3">Edit</button><button class="text-red-500 hover:underline text-xs">Remove</button></td></tr>
            <tr class="hover:bg-gray-50"><td class="px-5 py-3 flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-white text-xs font-bold">JP</div><div><p class="font-medium text-gray-900">James Patel</p><p class="text-xs text-gray-400">james@company.com</p></div></td><td class="px-5 py-3 text-gray-600">Member</td><td class="px-5 py-3"><span class="px-2 py-0.5 rounded-full text-xs bg-green-100 text-green-700">Active</span></td><td class="px-5 py-3 text-gray-400">Feb 3, 2026</td><td class="px-5 py-3"><button class="text-blue-600 hover:underline text-xs mr-3">Edit</button><button class="text-red-500 hover:underline text-xs">Remove</button></td></tr>
            <tr class="hover:bg-gray-50"><td class="px-5 py-3 flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-purple-500 flex items-center justify-center text-white text-xs font-bold">LC</div><div><p class="font-medium text-gray-900">Laura Chen</p><p class="text-xs text-gray-400">laura@company.com</p></div></td><td class="px-5 py-3 text-gray-600">Viewer</td><td class="px-5 py-3"><span class="px-2 py-0.5 rounded-full text-xs bg-gray-100 text-gray-500">Inactive</span></td><td class="px-5 py-3 text-gray-400">Dec 5, 2025</td><td class="px-5 py-3"><button class="text-blue-600 hover:underline text-xs mr-3">Edit</button><button class="text-red-500 hover:underline text-xs">Remove</button></td></tr>
          </tbody>
        </table>
      </div>
      </div>
    </main>
  </div>
</div>

<!-- Common Components -->
<script src="common-loader.js"></script>
<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>

</body>
</html>
