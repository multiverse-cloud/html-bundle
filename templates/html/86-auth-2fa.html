<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two-Factor Authentication — mtverse</title>
  <style>
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .auth-card{animation:fadeIn .3s ease}
    @keyframes spin{to{transform:rotate(360deg)}}
    .animate-spin{animation:spin 1s linear infinite}
    @keyframes shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-4px)}30%,60%,90%{transform:translateX(4px)}}
    .shake{animation:shake .4s ease}
    @media(prefers-reduced-motion:reduce){.auth-card,.animate-spin,.shake{animation:none!important}}
    .otp-input{
      width:48px;height:56px;text-align:center;font-size:1.5rem;font-weight:700;
      border:2px solid #e5e7eb;border-radius:.5rem;outline:none;
      background:white;color:#111827;transition:border-color .15s,box-shadow .15s;
      -moz-appearance:textfield;
    }
    .otp-input::-webkit-outer-spin-button,.otp-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .otp-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
    .otp-input.filled{border-color:#3b82f6;background:#eff6ff}
    .otp-input.error-state{border-color:#ef4444!important;background:#fef2f2!important;box-shadow:0 0 0 3px rgba(239,68,68,.15)!important}
    .dark .otp-input{background:#1f2937;border-color:#374151;color:#f9fafb}
    .dark .otp-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.25)}
    .dark .otp-input.filled{border-color:#3b82f6;background:#1e3a5f}
    .dark .otp-input.error-state{border-color:#ef4444!important;background:#3b0d0c!important}
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-950 flex items-center justify-center px-4 py-12 font-sans">

  <!-- Dark mode toggle -->
  <button id="darkToggle" aria-label="Toggle dark mode"
    class="fixed top-4 right-4 z-50 rounded-full p-2 bg-white dark:bg-gray-800 shadow border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
    <svg class="w-5 h-5 text-gray-600 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
    </svg>
    <svg class="w-5 h-5 text-yellow-400 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    </svg>
  </button>

  <div class="auth-card w-full max-w-sm">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
        <span class="text-white font-bold text-base leading-none">M</span>
      </div>
      <span class="text-gray-900 dark:text-white font-bold text-xl tracking-tight">mtverse</span>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl px-8 py-10 border border-gray-100 dark:border-gray-800">

      <!-- === OTP ENTRY STATE === -->
      <div id="otpState">
        <!-- Shield icon -->
        <div class="flex justify-center mb-6">
          <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/20 rounded-2xl flex items-center justify-center">
            <svg class="w-8 h-8 text-blue-600 dark:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
          </div>
        </div>
        <div class="text-center mb-8">
          <h2 class="text-xl font-bold text-gray-900 dark:text-white">Two-factor authentication</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Enter the 6-digit code from your authenticator app</p>
        </div>

        <!-- OTP input row -->
        <div id="otpRow" class="flex items-center justify-center gap-2 mb-3" role="group" aria-label="One-time password">
          <input class="otp-input" type="number" inputmode="numeric" maxlength="1" min="0" max="9" autocomplete="one-time-code" aria-label="Digit 1" />
          <input class="otp-input" type="number" inputmode="numeric" maxlength="1" min="0" max="9" aria-label="Digit 2" />
          <input class="otp-input" type="number" inputmode="numeric" maxlength="1" min="0" max="9" aria-label="Digit 3" />
          <span class="text-gray-300 dark:text-gray-600 text-xl font-light select-none mx-0.5">—</span>
          <input class="otp-input" type="number" inputmode="numeric" maxlength="1" min="0" max="9" aria-label="Digit 4" />
          <input class="otp-input" type="number" inputmode="numeric" maxlength="1" min="0" max="9" aria-label="Digit 5" />
          <input class="otp-input" type="number" inputmode="numeric" maxlength="1" min="0" max="9" aria-label="Digit 6" />
        </div>

        <!-- Error message -->
        <p id="otpError" class="hidden text-center text-xs text-red-600 dark:text-red-400 mb-4">Invalid code. Please try again.</p>

        <!-- Verify button -->
        <button type="button" id="verifyBtn" disabled
          class="w-full mt-4 rounded-lg bg-blue-600 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <svg id="verifySpinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
          <span id="verifyTxt">Verify code</span>
        </button>

        <!-- Resend -->
        <div class="mt-5 text-center">
          <p class="text-sm text-gray-500 dark:text-gray-400">
            Didn't receive a code?
            <button id="resendBtn" disabled
              class="text-blue-600 dark:text-blue-400 font-medium hover:underline disabled:opacity-50 disabled:cursor-not-allowed ml-1">
              Resend in <span id="countdown">30</span>s
            </button>
          </p>
        </div>

        <!-- Links -->
        <div class="mt-4 space-y-2 text-center">
          <div>
            <a href="#" class="text-sm text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
              Use backup code instead
            </a>
          </div>
          <div>
            <a href="81-auth-login.html" class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
              </svg>
              Back to sign in
            </a>
          </div>
        </div>
      </div>

      <!-- === SUCCESS STATE === -->
      <div id="successState" class="hidden text-center py-4">
        <div class="w-16 h-16 bg-green-50 dark:bg-green-900/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
          <svg class="w-8 h-8 text-green-600 dark:text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-2">Verified!</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Identity confirmed. Signing you in…</p>
        <div class="flex items-center justify-center gap-2 text-sm text-gray-400">
          <svg class="w-4 h-4 animate-spin text-blue-600" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
          Redirecting…
        </div>
      </div>

    </div>
  </div>

<script>
(function(){if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');})();
document.getElementById('darkToggle').addEventListener('click',function(){
  localStorage.setItem('darkMode',document.documentElement.classList.toggle('dark'));
});

const inputs=Array.from(document.querySelectorAll('.otp-input'));
const verifyBtn=document.getElementById('verifyBtn');

function getCode(){return inputs.map(i=>i.value).join('');}
function allFilled(){return inputs.every(i=>i.value.length===1);}

function checkAllFilled(){
  const filled=allFilled();
  verifyBtn.disabled=!filled;
  inputs.forEach(i=>{
    if(i.value) i.classList.add('filled');
    else i.classList.remove('filled');
  });
  if(filled) autoSubmit();
}

/* Auto-advance */
inputs.forEach(function(input,i){
  input.addEventListener('input',function(e){
    /* Only keep last digit typed */
    const val=e.target.value.replace(/\D/g,'');
    e.target.value=val?val[val.length-1]:'';
    if(e.target.value && i<inputs.length-1) inputs[i+1].focus();
    checkAllFilled();
  });
  input.addEventListener('keydown',function(e){
    if(e.key==='Backspace'){
      if(!e.target.value&&i>0){inputs[i-1].value='';inputs[i-1].focus();}
      else{e.target.value='';}
      e.preventDefault();
      checkAllFilled();
    }
    if(e.key==='ArrowLeft'&&i>0) inputs[i-1].focus();
    if(e.key==='ArrowRight'&&i<inputs.length-1) inputs[i+1].focus();
  });
});

/* Paste handler */
inputs[0].addEventListener('paste',function(e){
  const text=e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
  inputs.forEach(function(inp,i){inp.value=text[i]||'';});
  const next=Math.min(text.length,5);
  inputs[next].focus();
  checkAllFilled();
  e.preventDefault();
});

/* Auto-submit */
let autoSubmitTimer;
function autoSubmit(){
  clearTimeout(autoSubmitTimer);
  autoSubmitTimer=setTimeout(doVerify,400);
}

function doVerify(){
  clearTimeout(autoSubmitTimer);
  verifyBtn.disabled=true;
  document.getElementById('verifySpinner').classList.remove('hidden');
  document.getElementById('verifyTxt').textContent='Verifying…';
  document.getElementById('otpError').classList.add('hidden');

  setTimeout(function(){
    document.getElementById('otpState').classList.add('hidden');
    document.getElementById('successState').classList.remove('hidden');
  },1500);
}

verifyBtn.addEventListener('click',doVerify);

/* Resend countdown */
(function startCountdown(){
  let secs=30;
  const cdEl=document.getElementById('countdown');
  const resendBtn=document.getElementById('resendBtn');
  const timer=setInterval(function(){
    secs--;
    if(cdEl) cdEl.textContent=secs;
    if(secs<=0){
      clearInterval(timer);
      resendBtn.disabled=false;
      resendBtn.textContent='Resend code';
    }
  },1000);

  resendBtn.addEventListener('click',function(){
    if(this.disabled)return;
    this.disabled=true;
    this.innerHTML='Resend in <span id="countdown">30</span>s';
    inputs.forEach(i=>{i.value='';i.classList.remove('filled','error-state');});
    verifyBtn.disabled=true;
    inputs[0].focus();
    startCountdown();
  });
})();
</script>
</body>
</html>
