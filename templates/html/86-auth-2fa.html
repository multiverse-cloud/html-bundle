<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#465fff" />
  <meta name="description" content="Two-factor authentication for your mtverse account." />
  <title>Two-Factor Authentication - mtverse</title>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <style> .otp-input{caret-color:transparent;} </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-950 dark:text-gray-100" style="font-family:'Outfit',sans-serif;">
  <main class="grid min-h-screen grid-cols-1 lg:grid-cols-2">
    <section class="flex items-center justify-center px-6 py-12 lg:px-16">
      <div class="w-full max-w-[460px]">
        <a href="01-main-dashboard.html" class="mb-10 inline-flex items-center gap-3 text-sm font-semibold text-gray-900 dark:text-white">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none"><path d="M12 4l-1.41 1.41L15.17 10H4v2h11.17l-4.58 4.59L12 18l6-6-6-6z" fill="currentColor"/></svg>
          Back to dashboard
        </a>
        <div class="rounded-3xl border border-gray-200 bg-white p-10 shadow-lg shadow-gray-200/40 dark:border-gray-800 dark:bg-gray-950 dark:shadow-black/20">
          <div class="mb-8 text-center">
            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-3xl bg-purple-50 text-purple-600 dark:bg-purple-500/10 dark:text-purple-300">
              <svg class="h-8 w-8" viewBox="0 0 24 24" fill="none"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="currentColor"/></svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Two-factor authentication</h1>
            <p class="mt-3 text-sm text-gray-500 dark:text-gray-400">Enter the 6-digit code sent to <span class="font-semibold text-gray-900 dark:text-white">+91 ••••• •7890</span>.</p>
          </div>
          <form class="grid gap-5" onsubmit="return false;">
            <div class="grid gap-3 sm:grid-cols-6">
              <input type="text" inputmode="numeric" maxlength="1" class="otp-input h-14 w-full rounded-3xl border border-gray-200 bg-white text-center text-2xl font-semibold text-gray-900 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white" />
              <input type="text" inputmode="numeric" maxlength="1" class="otp-input h-14 w-full rounded-3xl border border-gray-200 bg-white text-center text-2xl font-semibold text-gray-900 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white" />
              <input type="text" inputmode="numeric" maxlength="1" class="otp-input h-14 w-full rounded-3xl border border-gray-200 bg-white text-center text-2xl font-semibold text-gray-900 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white" />
              <input type="text" inputmode="numeric" maxlength="1" class="otp-input h-14 w-full rounded-3xl border border-gray-200 bg-white text-center text-2xl font-semibold text-gray-900 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white" />
              <input type="text" inputmode="numeric" maxlength="1" class="otp-input h-14 w-full rounded-3xl border border-gray-200 bg-white text-center text-2xl font-semibold text-gray-900 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white" />
              <input type="text" inputmode="numeric" maxlength="1" class="otp-input h-14 w-full rounded-3xl border border-gray-200 bg-white text-center text-2xl font-semibold text-gray-900 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white" />
            </div>
            <button type="submit" class="h-11 rounded-2xl bg-blue-600 text-sm font-semibold text-white shadow-lg shadow-blue-600/25 transition hover:bg-blue-700 active:scale-[0.98]">Verify and sign in</button>
          </form>
          <p class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
            Didn�t receive a code?
            <button id="resend-btn" onclick="startResendTimer()" class="font-semibold text-blue-600 hover:underline">Resend code</button>
            <span id="resend-timer" class="hidden text-gray-400"> </span>
          </p>
          <p class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
            <a href="81-auth-login.html" class="font-semibold text-blue-600 hover:underline">Back to sign in</a>
          </p>
        </div>
        <p class="mt-6 text-center text-xs text-gray-400 dark:text-gray-600">� 2025 mtverse. All rights reserved.</p>
      </div>
    </section>

    <section class="relative hidden overflow-hidden lg:flex lg:flex-col lg:justify-end" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);">
      <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(circle at 20% 30%, rgba(139,92,246,0.22) 0%, transparent 35%), radial-gradient(circle at 80% 80%, rgba(168,85,247,0.18) 0%, transparent 30%);"></div>
      <div class="relative z-10 flex flex-col items-center justify-center px-12 py-20 text-white">
        <div class="mb-6 flex h-16 w-16 items-center justify-center rounded-3xl bg-white/10 shadow-2xl shadow-white/10">
          <svg class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        </div>
        <h2 class="text-center text-4xl font-bold tracking-tight">Secure sign in with 2FA</h2>
        <p class="mt-4 max-w-md text-center text-base text-white/70 leading-7">Add an extra layer of protection with a sleek verification step that keeps your workspace safe.</p>
      </div>
    </section>
  </main>
  <script>
    const otpInputs = document.querySelectorAll('.otp-input');
    otpInputs.forEach((input, idx) => {
      input.addEventListener('input', (event) => {
        const value = event.target.value.replace(/\D/g, '');
        event.target.value = value.slice(-1);
        if (value && idx < otpInputs.length - 1) otpInputs[idx + 1].focus();
      });
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Backspace' && !input.value && idx > 0) otpInputs[idx - 1].focus();
      });
      input.addEventListener('paste', (event) => {
        event.preventDefault();
        const pasted = (event.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        pasted.split('').slice(0, otpInputs.length).forEach((char, index) => {
          otpInputs[index].value = char;
        });
        const nextIndex = Math.min(pasted.length, otpInputs.length - 1);
        otpInputs[nextIndex].focus();
      });
    });
    otpInputs[0]?.focus();
    function startResendTimer() {
      const btn = document.getElementById('resend-btn');
      const timer = document.getElementById('resend-timer');
      btn.classList.add('hidden');
      timer.classList.remove('hidden');
      let seconds = 30;
      timer.textContent = '(wait ' + seconds + 's)';
      const interval = setInterval(() => {
        seconds -= 1;
        timer.textContent = '(wait ' + seconds + 's)';
        if (seconds <= 0) {
          clearInterval(interval);
          timer.classList.add('hidden');
          btn.classList.remove('hidden');
        }
      }, 1000);
    }
  </script>
</body>
</html>
