<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#465fff" />
  <meta name="description" content="Production-ready Edit Profile HTML dashboard template with responsive TailAdmin-style layout, dark mode, command palette, actions, loaders, and polished UI states." />
  <title>Edit Profile — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-slideDown {
      animation: slideDown 0.2s ease-out;
    }
    .sidebar-text {
      transition: opacity 0.2s ease-in-out;
    }
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100">

<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar Container -->
  <div id="sidebar-container"></div>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">
<div class="mb-6">
      <h1 class="text-xl font-bold text-gray-900">Edit Profile</h1>
      <p class="text-sm text-gray-500 mt-1">Update your public profile information</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Avatar Upload -->
      <div class="lg:col-span-1">
        <div class="bg-white rounded-xl border border-gray-200 p-6 text-center">
          <div class="relative inline-block mb-4">
            <div class="w-24 h-24 rounded-full bg-blue-600 flex items-center justify-center text-white text-2xl font-bold mx-auto">AD</div>
            <button class="absolute bottom-0 right-0 w-8 h-8 bg-gray-800 rounded-full flex items-center justify-center text-white text-xs hover:bg-gray-700">
              📷
            </button>
          </div>
          <p class="text-sm font-medium text-gray-800">Alex Donovan</p>
          <p class="text-xs text-gray-500 mb-4">@alexdonovan</p>
          <button class="w-full px-3 py-2 border border-gray-200 text-sm text-gray-700 rounded-lg hover:bg-gray-50">Upload New Photo</button>
          <p class="text-xs text-gray-400 mt-2">JPG, PNG up to 5MB</p>
          <button class="mt-2 text-xs text-red-500 hover:underline">Remove photo</button>
        </div>
      </div>

      <!-- Profile Form -->
      <div class="lg:col-span-2 space-y-5">
        <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
          <h2 class="font-semibold text-gray-800 text-sm">Basic Information</h2>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Display Name</label>
              <input type="text" value="Alex Donovan" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="showUnsaved()" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Username</label>
              <div class="flex">
                <span class="px-3 py-2 bg-gray-50 border border-r-0 border-gray-200 rounded-l-lg text-sm text-gray-500">@</span>
                <input type="text" value="alexdonovan" class="flex-1 px-3 py-2 text-sm border border-gray-200 rounded-r-lg focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="showUnsaved()" />
              </div>
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Email <span class="text-gray-400">(readonly)</span></label>
            <input type="email" value="alex@mtverse.dev" readonly class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-500 cursor-not-allowed" />
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Bio</label>
            <textarea id="bio" maxlength="200" oninput="updateCounter(); showUnsaved()" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" rows="3">Full-stack developer & UI designer. Building premium SaaS templates and developer tools at mtverse. Open source enthusiast 🚀</textarea>
            <p class="text-xs text-gray-400 text-right mt-1"><span id="char-count">143</span>/200</p>
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Website URL</label>
            <input type="url" value="https://alexdonovan.dev" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="showUnsaved()" />
          </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
          <h2 class="font-semibold text-gray-800 text-sm">Social Links</h2>
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Twitter / X</label>
            <div class="flex">
              <span class="px-3 py-2 bg-gray-50 border border-r-0 border-gray-200 rounded-l-lg text-sm">🐦</span>
              <input type="text" value="@alexdonovan" placeholder="@username" class="flex-1 px-3 py-2 text-sm border border-gray-200 rounded-r-lg focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="showUnsaved()" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">GitHub</label>
            <div class="flex">
              <span class="px-3 py-2 bg-gray-50 border border-r-0 border-gray-200 rounded-l-lg text-sm">🐙</span>
              <input type="text" value="alexdonovan" placeholder="username" class="flex-1 px-3 py-2 text-sm border border-gray-200 rounded-r-lg focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="showUnsaved()" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">LinkedIn</label>
            <div class="flex">
              <span class="px-3 py-2 bg-gray-50 border border-r-0 border-gray-200 rounded-l-lg text-sm">💼</span>
              <input type="text" value="in/alexdonovan" placeholder="in/username" class="flex-1 px-3 py-2 text-sm border border-gray-200 rounded-r-lg focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="showUnsaved()" />
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
          <h2 class="font-semibold text-gray-800 text-sm">Preferences</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Timezone</label>
              <select class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="showUnsaved()">
                <option selected>America/Los_Angeles (UTC-7)</option>
                <option>America/New_York (UTC-4)</option>
                <option>Europe/London (UTC+0)</option>
                <option>Asia/Tokyo (UTC+9)</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Language</label>
              <select class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="showUnsaved()">
                <option selected>English (US)</option>
                <option>English (UK)</option>
                <option>Spanish</option>
                <option>French</option>
                <option>German</option>
              </select>
            </div>
          </div>
        </div>

        <div class="flex items-center justify-end gap-3">
          <button class="px-4 py-2 border border-gray-200 text-sm text-gray-700 rounded-lg hover:bg-gray-50">Cancel</button>
          <button type="button" class="px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">Save Changes</button>
        </div>
      </div>
    </div>
      </div>
    </main>
  </div>
</div>

<!-- Common Components -->
<script src="common-loader.js"></script>
<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>

</body>
</html>
