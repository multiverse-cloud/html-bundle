<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — mtverse</title>
  <link rel="stylesheet" href="../css/tailwind-production.css" />
  <link rel="stylesheet" href="../css/pro-styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      margin: 0;
      background-color: #fff;
      background-image: radial-gradient(circle, rgba(99,102,241,.10) 1px, transparent 1px);
      background-size: 22px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      transition: background-color 0.3s, color 0.3s;
    }
    .dark body {
      background-color: #030712;
    }
    html.dark body {
      background-color: #030712;
      background-image: radial-gradient(circle, rgba(99,102,241,.08) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    @keyframes lockBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes checkDraw {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    .card {
      animation: fadeUp 0.5s ease both;
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.12), 0 4px 16px rgba(0,0,0,.06);
      border: 1px solid #e5e7eb;
      width: 100%;
      max-width: 26rem;
      padding: 2.5rem 2rem;
      position: relative;
    }
    html.dark .card {
      background: #111827;
      border-color: #1f2937;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .lock-icon { animation: lockBob 3s ease-in-out infinite; }
    .check-anim { animation: checkDraw 0.4s ease both; transform-origin: center; }
    .btn-primary {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #3b82f6;
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      border-radius: 0.625rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-primary:hover:not(:disabled) { background: #2563eb; }
    .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn-outline {
      width: 100%;
      padding: 0.75rem 1rem;
      background: transparent;
      color: #3b82f6;
      font-weight: 600;
      font-size: 0.95rem;
      border: 2px solid #3b82f6;
      border-radius: 0.625rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.2s;
      text-decoration: none;
    }
    .btn-outline:hover { background: #eff6ff; }
    html.dark .btn-outline:hover { background: #1e3a5f; }

    .input-field {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #d1d5db;
      border-radius: 0.625rem;
      font-size: 0.95rem;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
      color: #111827;
    }
    .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .input-field.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.1); }
    html.dark .input-field { background: #1f2937; border-color: #374151; color: #f9fafb; }
    html.dark .input-field:focus { border-color: #3b82f6; }
    html.dark .input-field.error { border-color: #ef4444; }
    .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: 0.3rem; display: none; }
    .error-msg.visible { display: block; }
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.35rem;
      color: #6b7280; font-size: 0.875rem; text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #3b82f6; }
    html.dark .back-link { color: #9ca3af; }
    html.dark .back-link:hover { color: #60a5fa; }
    /* Dark mode toggle */
    #dm-toggle {
      position: fixed; top: 1rem; right: 1rem;
      background: #fff; border: 1.5px solid #e5e7eb;
      border-radius: 999px; width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.08);
      transition: background 0.2s, border-color 0.2s;
      z-index: 100;
    }
    html.dark #dm-toggle { background: #1f2937; border-color: #374151; }
    #dm-toggle svg { width: 20px; height: 20px; }
    .countdown-link { color: #3b82f6; cursor: pointer; font-weight: 600; text-decoration: underline; }
    .resend-note { font-size: 0.85rem; color: #6b7280; margin-top: 0.75rem; text-align: center; }
    html.dark .resend-note { color: #9ca3af; }
  </style>
</head>
<body>
  <!-- Dark mode toggle -->
  <button id="dm-toggle" aria-label="Toggle dark mode" onclick="toggleDark()">
    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
    </svg>
    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#f59e0b" stroke-width="2" style="display:none">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <!-- Card -->
  <div class="card" id="main-card">

    <!-- ===== INITIAL STATE ===== -->
    <div id="form-state">
      <!-- Lock icon -->
      <div style="display:flex;justify-content:center;margin-bottom:1.5rem;">
        <svg class="lock-icon" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="12" y="30" width="40" height="26" rx="6" fill="#3b82f6" opacity=".15"/>
          <rect x="12" y="30" width="40" height="26" rx="6" stroke="#3b82f6" stroke-width="3" fill="none"/>
          <path d="M21 30V22a11 11 0 0122 0v8" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" fill="none"/>
          <circle cx="32" cy="44" r="4" fill="#3b82f6"/>
          <line x1="32" y1="47" x2="32" y2="52" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <!-- Heading -->
      <h1 style="font-size:1.75rem;font-weight:700;color:#111827;text-align:center;margin:0 0 0.5rem;">Forgot password?</h1>
      <p id="subtitle-text" style="font-size:0.875rem;color:#6b7280;text-align:center;margin:0 0 1.75rem;line-height:1.5;">Enter your email and we'll send you a reset link.</p>

      <!-- Form -->
      <form id="forgot-form" novalidate onsubmit="handleSubmit(event)">
        <div style="margin-bottom:1.25rem;">
          <label for="email-input" style="display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:0.4rem;">Email address</label>
          <input
            id="email-input"
            type="email"
            class="input-field"
            placeholder="you@example.com"
            autocomplete="email"
            inputmode="email"
          />
          <p class="error-msg" id="email-error">Please enter a valid email address.</p>
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">
          <div class="spinner" id="btn-spinner"></div>
          <span id="btn-text">Send reset link</span>
        </button>
      </form>

      <!-- Back link -->
      <div style="text-align:center;margin-top:1.5rem;">
        <a href="81-auth-login.html" class="back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          Back to sign in
        </a>
      </div>
    </div><!-- /form-state -->

    <!-- ===== SUCCESS STATE (hidden initially) ===== -->
    <div id="success-state" style="display:none;text-align:center;">
      <!-- Green checkmark -->
      <div style="display:flex;justify-content:center;margin-bottom:1.5rem;">
        <svg class="check-anim" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="34" fill="#d1fae5" stroke="#10b981" stroke-width="3"/>
          <polyline points="22,37 31,46 50,26" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <h2 style="font-size:1.5rem;font-weight:700;color:#111827;margin:0 0 0.5rem;">Check your email</h2>
      <p style="font-size:0.9rem;color:#6b7280;margin:0 0 1.5rem;line-height:1.6;">
        We sent a reset link to <span id="sent-email" style="color:#3b82f6;font-weight:700;"></span>
      </p>
      <!-- Open Gmail button -->
      <a href="https://gmail.com" target="_blank" rel="noopener noreferrer" class="btn-outline" style="margin-bottom:1rem;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
        </svg>
        Open Gmail
      </a>
      <!-- Resend countdown -->
      <p class="resend-note" id="resend-area">
        <span id="resend-countdown">Resend in <strong id="cd-secs">59</strong>s</span>
        <span id="resend-link" style="display:none;"><a class="countdown-link" onclick="startResend()">Resend email</a></span>
      </p>
      <!-- Back link -->
      <div style="margin-top:1.25rem;">
        <a href="81-auth-login.html" class="back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          Back to sign in
        </a>
      </div>
    </div><!-- /success-state -->

  </div><!-- /card -->

  <script>
    // ── Dark mode ──────────────────────────────────────────────
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
      updateIcons();
    })();

    function updateIcons() {
      const isDark = document.documentElement.classList.contains('dark');
      document.getElementById('icon-moon').style.display = isDark ? 'none' : 'block';
      document.getElementById('icon-sun').style.display  = isDark ? 'block' : 'none';
    }

    function toggleDark() {
      const html = document.documentElement;
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      updateIcons();
    }

    // ── Email validation ───────────────────────────────────────
    const emailInput = document.getElementById('email-input');
    const emailError = document.getElementById('email-error');

    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    }

    emailInput.addEventListener('blur', function() {
      if (emailInput.value && !isValidEmail(emailInput.value)) {
        emailInput.classList.add('error');
        emailError.classList.add('visible');
      } else {
        emailInput.classList.remove('error');
        emailError.classList.remove('visible');
      }
    });

    emailInput.addEventListener('input', function() {
      if (emailInput.classList.contains('error') && isValidEmail(emailInput.value)) {
        emailInput.classList.remove('error');
        emailError.classList.remove('visible');
      }
    });

    // ── Form submit ────────────────────────────────────────────
    function handleSubmit(e) {
      e.preventDefault();
      const val = emailInput.value.trim();
      if (!isValidEmail(val)) {
        emailInput.classList.add('error');
        emailError.classList.add('visible');
        emailInput.focus();
        return;
      }
      // Show loading state
      const btn    = document.getElementById('submit-btn');
      const spinner= document.getElementById('btn-spinner');
      const btnTxt = document.getElementById('btn-text');
      btn.disabled = true;
      spinner.style.display = 'block';
      btnTxt.textContent = 'Sending…';

      // Simulate network delay
      setTimeout(function() {
        showSuccess(val);
      }, 1400);
    }

    // ── Show success state ─────────────────────────────────────
    function showSuccess(email) {
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('sent-email').textContent = email;
      const ss = document.getElementById('success-state');
      ss.style.display = 'block';
      // Re-trigger check animation
      const checkSvg = ss.querySelector('.check-anim');
      checkSvg.style.animation = 'none';
      checkSvg.offsetHeight; // reflow
      checkSvg.style.animation = '';
      startCountdown();
    }

    // ── Resend countdown ───────────────────────────────────────
    let _cdTimer = null;

    function startCountdown() {
      clearInterval(_cdTimer);
      let secs = 59;
      document.getElementById('cd-secs').textContent = secs;
      document.getElementById('resend-countdown').style.display = 'inline';
      document.getElementById('resend-link').style.display = 'none';

      _cdTimer = setInterval(function() {
        secs--;
        document.getElementById('cd-secs').textContent = secs;
        if (secs <= 0) {
          clearInterval(_cdTimer);
          document.getElementById('resend-countdown').style.display = 'none';
          document.getElementById('resend-link').style.display = 'inline';
        }
      }, 1000);
    }

    function startResend() {
      startCountdown();
      // (In production: trigger API call to resend email here)
    }
  </script>
</body>
</html>
