<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — mtverse</title>
  <style>
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .auth-card{animation:fadeIn .3s ease}
    @keyframes spin{to{transform:rotate(360deg)}}
    .animate-spin{animation:spin 1s linear infinite}
    .field-error input{border-color:#ef4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.12)!important}
    .field-error .error-msg{display:flex!important}
    @media(prefers-reduced-motion:reduce){.auth-card,.animate-spin{animation:none!important}}
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-950 flex items-center justify-center px-4 py-12 font-sans">

  <!-- Dark mode toggle -->
  <button id="darkToggle" aria-label="Toggle dark mode"
    class="fixed top-4 right-4 z-50 rounded-full p-2 bg-white dark:bg-gray-800 shadow border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
    <svg class="w-5 h-5 text-gray-600 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
    </svg>
    <svg class="w-5 h-5 text-yellow-400 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    </svg>
  </button>

  <div class="auth-card w-full max-w-md">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
        <span class="text-white font-bold text-base leading-none">M</span>
      </div>
      <span class="text-gray-900 dark:text-white font-bold text-xl tracking-tight">mtverse</span>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl px-8 py-10 border border-gray-100 dark:border-gray-800">

      <!-- === FORM STATE === -->
      <div id="formState">
        <!-- Lock icon -->
        <div class="flex justify-center mb-6">
          <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/20 rounded-2xl flex items-center justify-center">
            <svg class="w-8 h-8 text-blue-600 dark:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </div>
        </div>
        <div class="text-center mb-8">
          <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Forgot your password?</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Enter your email and we'll send you a reset link.</p>
        </div>

        <form id="forgotForm" novalidate class="space-y-5">
          <div id="emailField" class="space-y-1.5">
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email address</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
              </div>
              <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com"
                class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 pl-10 pr-3.5 py-2.5 text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow" />
            </div>
            <p class="error-msg hidden items-center gap-1 text-xs text-red-600 dark:text-red-400">
              <svg class="w-3.5 h-3.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
              <span id="emailErrTxt">Email is required</span>
            </p>
          </div>
          <button type="submit" id="submitBtn"
            class="w-full rounded-lg bg-blue-600 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 transition-colors disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <svg id="btnSpinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
            <span id="btnText">Send Reset Link</span>
          </button>
        </form>
      </div>


      <!-- === SUCCESS STATE === -->
      <div id="successState" class="hidden text-center">
        <div class="flex justify-center mb-6">
          <div class="w-16 h-16 bg-green-50 dark:bg-green-900/20 rounded-2xl flex items-center justify-center">
            <svg class="w-8 h-8 text-green-600 dark:text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Check your inbox</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-8">
          We sent a password reset link to <strong id="sentToEmail" class="text-gray-700 dark:text-gray-300"></strong>
        </p>
        <!-- Quick open buttons -->
        <div class="grid grid-cols-2 gap-3 mb-6">
          <a href="https://mail.google.com" target="_blank" rel="noopener"
            class="flex items-center justify-center gap-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-4 py-2.5 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Open Gmail
          </a>
          <a href="https://outlook.live.com" target="_blank" rel="noopener"
            class="flex items-center justify-center gap-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-4 py-2.5 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
            <svg class="w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 24 24">
              <path d="M7.88 12.04q0 .45-.11.87-.1.41-.33.74-.22.33-.58.52-.37.2-.87.2t-.85-.2q-.35-.21-.57-.55-.22-.33-.33-.75-.1-.42-.1-.86t.1-.87q.1-.43.34-.76.22-.34.59-.54.36-.2.87-.2t.86.2q.35.21.57.55.22.34.31.77.1.43.1.88zM24 12v9.38q0 .46-.33.8-.33.32-.8.32H7.13q-.46 0-.8-.33-.32-.33-.32-.8V18H1q-.41 0-.7-.3-.3-.29-.3-.7V7q0-.41.3-.7Q.58 6 1 6h6.1V2.55q0-.44.3-.75.3-.3.75-.3h12.9q.44 0 .75.3.3.3.3.75V10.85l1.24.72q.49.28.49.85z"/>
            </svg>
            Open Outlook
          </a>
        </div>
        <!-- Resend with countdown -->
        <p class="text-sm text-gray-500 dark:text-gray-400">
          Didn't receive it?
          <button id="resendBtn"
            class="text-blue-600 dark:text-blue-400 font-medium hover:underline disabled:opacity-50 disabled:cursor-not-allowed disabled:no-underline"
            disabled>
            Resend in <span id="countdown">60</span>s
          </button>
        </p>
      </div>

      <!-- Back to sign in -->
      <div class="mt-8 text-center">
        <a href="81-auth-login.html" class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back to sign in
        </a>
      </div>
    </div>
  </div>

<script>
(function(){if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');})();
document.getElementById('darkToggle').addEventListener('click',function(){
  localStorage.setItem('darkMode',document.documentElement.classList.toggle('dark'));
});

function setError(msg){
  const w=document.getElementById('emailField');
  w.classList.add('field-error');
  document.getElementById('emailErrTxt').textContent=msg;
  const e=w.querySelector('.error-msg');
  e.classList.remove('hidden');e.style.display='flex';
}
function clearError(){
  const w=document.getElementById('emailField');
  w.classList.remove('field-error');
  const e=w.querySelector('.error-msg');
  e.classList.add('hidden');e.style.display='';
}

/* Countdown */
function startCountdown(){
  let secs=60;
  const countEl=document.getElementById('countdown');
  const resendBtn=document.getElementById('resendBtn');
  const timer=setInterval(function(){
    secs--;
    countEl.textContent=secs;
    if(secs<=0){
      clearInterval(timer);
      resendBtn.disabled=false;
      resendBtn.innerHTML='Resend email';
    }
  },1000);
}

document.getElementById('forgotForm').addEventListener('submit',function(e){
  e.preventDefault();
  const email=document.getElementById('email').value.trim();
  if(!email){setError('Email is required');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setError('Please enter a valid email');return;}
  clearError();

  const btn=document.getElementById('submitBtn');
  document.getElementById('btnSpinner').classList.remove('hidden');
  document.getElementById('btnText').textContent='Sending…';
  btn.disabled=true;

  setTimeout(function(){
    document.getElementById('sentToEmail').textContent=email;
    document.getElementById('formState').classList.add('hidden');
    document.getElementById('successState').classList.remove('hidden');
    startCountdown();
  },1200);
});

document.getElementById('resendBtn').addEventListener('click',function(){
  if(this.disabled)return;
  this.disabled=true;
  this.innerHTML='Resend in <span id="countdown">60</span>s';
  startCountdown();
});
</script>
</body>
</html>
