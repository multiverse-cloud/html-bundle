<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Orders — mtverse</title>
  <style>
    .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    tr.selected td{background:#eff6ff!important;}
    html.dark tr.selected td{background:#1e3a5f!important;}
    .bulk-bar{transition:all .2s;}
    .sort-btn{cursor:pointer;user-select:none;}
    .sort-btn:hover{color:#2563eb;}
    .row-expand{display:none;}
    .row-expand.open{display:table-row;}
  </style>
  <link rel="stylesheet" href="tailwind-production.css">
  <link rel="stylesheet" href="pro-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans dark:bg-gray-900 dark:text-gray-100" style="font-family:'Outfit',sans-serif;">
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>
<div class="flex h-screen overflow-hidden">
  <div id="sidebar-container"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="header-container"></div>
    <main class="flex-1 overflow-y-auto overflow-x-hidden px-4 md:px-6 2xl:px-10 py-6" tabindex="-1">
      <div class="mx-auto w-full max-w-screen-2xl">

        <!-- Page header -->
        <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Orders</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Track and manage all customer orders</p>
          </div>
          <div class="flex flex-wrap gap-2">
            <button type="button" onclick="exportOrders()" class="inline-flex items-center gap-1.5 rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition dark:border-gray-700 dark:bg-white/[.03] dark:text-gray-300">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export
            </button>
            <button type="button" class="inline-flex items-center gap-1.5 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 transition shadow-sm">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              New Order
            </button>
          </div>
        </div>

        <!-- Bulk action bar -->
        <div id="bulkBar" class="bulk-bar hidden mb-4 flex items-center gap-3 rounded-xl bg-blue-50 border border-blue-200 px-4 py-3 dark:bg-blue-500/10 dark:border-blue-800">
          <span class="text-sm font-semibold text-blue-700 dark:text-blue-300" id="bulkCount">0 selected</span>
          <div class="flex gap-2 ml-auto">
            <button class="rounded-lg bg-white border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-600 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-300">Mark Paid</button>
            <button class="rounded-lg bg-white border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-600 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-300">Archive</button>
            <button onclick="clearSelection()" class="rounded-lg bg-white border border-gray-200 px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50 dark:bg-gray-800 dark:border-gray-600">Clear</button>
          </div>
        </div>

        <div class="rounded-2xl border border-gray-200 bg-white overflow-hidden dark:border-gray-800 dark:bg-white/[.03]">
          <!-- Filter row -->
          <div class="px-5 py-4 border-b border-gray-200 dark:border-gray-800 flex flex-wrap gap-3">
            <div class="relative flex-1 min-w-[160px]">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <input type="text" id="searchInput" placeholder="Search orders…" oninput="filterTable()"
                class="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500" />
            </div>
            <select id="statusFilter" onchange="filterTable()"
              class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300">
              <option value="">All Status</option>
              <option>Paid</option>
              <option>Processing</option>
              <option>Refunded</option>
              <option>Pending</option>
            </select>
            <input type="date" id="dateFrom" onchange="filterTable()" class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300" />
            <button onclick="clearFilters()" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 font-medium">Clear filters</button>
          </div>

          <!-- Table -->
          <div class="overflow-x-auto">
            <table class="w-full text-sm" id="ordersTable">
              <thead>
                <tr class="border-b border-gray-200 dark:border-gray-800 bg-gray-50/80 dark:bg-white/[.02]">
                  <th class="px-4 py-3 text-left w-10">
                    <input type="checkbox" id="selectAll" onclick="toggleAll(this)" class="rounded border-gray-300 text-blue-600 dark:border-gray-600" />
                  </th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider sort-btn" onclick="sortTable(1)">Order # <span class="sort-icon">↕</span></th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider sort-btn" onclick="sortTable(2)">Customer <span class="sort-icon">↕</span></th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider">Items</th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider sort-btn" onclick="sortTable(4)">Amount <span class="sort-icon">↕</span></th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider">Status</th>
                  <th class="px-4 py-3 text-left font-semibold text-xs text-gray-500 uppercase tracking-wider sort-btn" onclick="sortTable(6)">Date <span class="sort-icon">↕</span></th>
                  <th class="px-4 py-3 text-right font-semibold text-xs text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
              </thead>
              <tbody id="ordersBody">
                <!-- Rows generated by JS -->
              </tbody>
            </table>
          </div>

          <!-- Empty state -->
          <div id="emptyState" class="hidden px-5 py-16 text-center">
            <svg class="mx-auto mb-3 text-gray-300" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <p class="text-gray-500 dark:text-gray-400 font-medium">No orders match your filters</p>
            <button onclick="clearFilters()" class="mt-3 text-sm text-blue-600 hover:underline">Clear filters</button>
          </div>

          <!-- Pagination -->
          <div class="px-5 py-4 border-t border-gray-200 dark:border-gray-800 flex flex-wrap items-center justify-between gap-3">
            <span class="text-sm text-gray-500 dark:text-gray-400" id="paginationInfo">Showing 1–12 of 284 orders</span>
            <div class="flex items-center gap-1">
              <button class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-500 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-800">← Prev</button>
              <button class="rounded-lg border border-blue-600 bg-blue-600 px-3 py-1.5 text-sm text-white">1</button>
              <button class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-500 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-800">2</button>
              <button class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-500 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-800">3</button>
              <span class="text-gray-400 px-1">…</span>
              <button class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-500 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-800">24</button>
              <button class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-500 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-800">Next →</button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
<script src="common-sidebar.js"></script>
<script src="common-header.js"></script>
<script src="app-shell.js"></script>
<script>
const orders = [
  { id:'ORD-4821', customer:'Alice Johnson',  avatar:'AJ', color:'#7c3aed', items:2, amount:49,  status:'Paid',       date:'May 27, 2025' },
  { id:'ORD-4820', customer:'Bob Martinez',   avatar:'BM', color:'#0891b2', items:1, amount:29,  status:'Paid',       date:'May 27, 2025' },
  { id:'ORD-4819', customer:'Carol White',    avatar:'CW', color:'#b45309', items:3, amount:127, status:'Processing', date:'May 26, 2025' },
  { id:'ORD-4818', customer:'David Kim',      avatar:'DK', color:'#be123c', items:1, amount:99,  status:'Processing', date:'May 26, 2025' },
  { id:'ORD-4817', customer:'Eva Chen',       avatar:'EC', color:'#15803d', items:5, amount:199, status:'Paid',       date:'May 25, 2025' },
  { id:'ORD-4816', customer:'Frank Lee',      avatar:'FL', color:'#1d4ed8', items:1, amount:19,  status:'Refunded',   date:'May 25, 2025' },
  { id:'ORD-4815', customer:'Grace Park',     avatar:'GP', color:'#7c3aed', items:2, amount:78,  status:'Paid',       date:'May 24, 2025' },
  { id:'ORD-4814', customer:'Hiro Tanaka',    avatar:'HT', color:'#0f766e', items:1, amount:49,  status:'Pending',    date:'May 24, 2025' },
  { id:'ORD-4813', customer:'Isla Wright',    avatar:'IW', color:'#c2410c', items:4, amount:156, status:'Paid',       date:'May 23, 2025' },
  { id:'ORD-4812', customer:'Jack Thompson',  avatar:'JT', color:'#7e22ce', items:1, amount:399, status:'Paid',       date:'May 23, 2025' },
  { id:'ORD-4811', customer:'Kim Nguyen',     avatar:'KN', color:'#0369a1', items:2, amount:58,  status:'Processing', date:'May 22, 2025' },
  { id:'ORD-4810', customer:'Lena Müller',    avatar:'LM', color:'#4d7c0f', items:1, amount:29,  status:'Pending',    date:'May 22, 2025' },
];

const statusColors = {
  'Paid':       'bg-green-100 text-green-700 dark:bg-green-500/15 dark:text-green-400',
  'Processing': 'bg-blue-100 text-blue-700 dark:bg-blue-500/15 dark:text-blue-400',
  'Refunded':   'bg-gray-100 text-gray-600 dark:bg-gray-500/15 dark:text-gray-400',
  'Pending':    'bg-amber-100 text-amber-700 dark:bg-amber-500/15 dark:text-amber-400',
};

let filteredOrders = [...orders];
let selectedIds = new Set();
let expandedId = null;

function renderTable() {
  const tbody = document.getElementById('ordersBody');
  const empty = document.getElementById('emptyState');
  if (filteredOrders.length === 0) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  tbody.innerHTML = filteredOrders.map(o => `
    <tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-white/[.02] transition cursor-pointer${selectedIds.has(o.id)?' selected':''}" onclick="toggleExpand('${o.id}')">
      <td class="px-4 py-3" onclick="event.stopPropagation()">
        <input type="checkbox" ${selectedIds.has(o.id)?'checked':''} onchange="toggleRow('${o.id}',this)" class="rounded border-gray-300 text-blue-600 dark:border-gray-600" />
      </td>
      <td class="px-4 py-3 font-mono text-xs font-semibold text-gray-700 dark:text-gray-300">${o.id}</td>
      <td class="px-4 py-3">
        <div class="flex items-center gap-2.5">
          <div class="h-8 w-8 rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0" style="background:${o.color}">${o.avatar}</div>
          <span class="font-medium text-gray-800 dark:text-gray-200">${o.customer}</span>
        </div>
      </td>
      <td class="px-4 py-3 text-gray-600 dark:text-gray-400">${o.items} item${o.items!==1?'s':''}</td>
      <td class="px-4 py-3 font-semibold text-gray-900 dark:text-white">$${o.amount.toFixed(2)}</td>
      <td class="px-4 py-3">
        <span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-0.5 text-xs font-semibold ${statusColors[o.status]}">${o.status}</span>
      </td>
      <td class="px-4 py-3 text-gray-500 dark:text-gray-400 text-xs">${o.date}</td>
      <td class="px-4 py-3 text-right" onclick="event.stopPropagation()">
        <div class="flex items-center justify-end gap-1 opacity-0 group-hover:opacity-100 transition" style="opacity:1">
          <button class="rounded-lg px-2.5 py-1.5 text-xs font-medium text-blue-600 hover:bg-blue-50 dark:text-blue-400 dark:hover:bg-blue-500/10 transition">View</button>
          <button class="rounded-lg px-2.5 py-1.5 text-xs font-medium text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800 transition">Edit</button>
        </div>
      </td>
    </tr>
    <tr class="row-expand${expandedId===o.id?' open':''} bg-blue-50/50 dark:bg-blue-500/5">
      <td colspan="8" class="px-8 py-4">
        <div class="flex flex-wrap gap-6 text-sm">
          <div><div class="text-xs text-gray-400 mb-1">Order ID</div><div class="font-mono font-semibold text-gray-700 dark:text-gray-200">${o.id}</div></div>
          <div><div class="text-xs text-gray-400 mb-1">Customer</div><div class="font-medium text-gray-700 dark:text-gray-200">${o.customer}</div></div>
          <div><div class="text-xs text-gray-400 mb-1">Total</div><div class="font-bold text-gray-900 dark:text-white">$${o.amount.toFixed(2)}</div></div>
          <div><div class="text-xs text-gray-400 mb-1">Status</div><div><span class="rounded-full px-2.5 py-0.5 text-xs font-semibold ${statusColors[o.status]}">${o.status}</span></div></div>
          <div><div class="text-xs text-gray-400 mb-1">Date</div><div class="text-gray-700 dark:text-gray-300">${o.date}</div></div>
          <div class="ml-auto flex gap-2">
            <button class="rounded-lg bg-blue-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-blue-700">View Full Order</button>
            <button class="rounded-lg border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-600 hover:bg-gray-100 dark:border-gray-700 dark:text-gray-300">Send Invoice</button>
          </div>
        </div>
      </td>
    </tr>
  `).join('');
  document.getElementById('paginationInfo').textContent = `Showing 1–${filteredOrders.length} of 284 orders`;
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  renderTable();
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const s = document.getElementById('statusFilter').value;
  filteredOrders = orders.filter(o => {
    const matchQ = !q || o.id.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q);
    const matchS = !s || o.status === s;
    return matchQ && matchS;
  });
  renderTable();
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('statusFilter').value = '';
  document.getElementById('dateFrom').value = '';
  filteredOrders = [...orders];
  renderTable();
}

function toggleRow(id, cb) {
  if (cb.checked) selectedIds.add(id); else selectedIds.delete(id);
  updateBulkBar();
  renderTable();
}

function toggleAll(cb) {
  filteredOrders.forEach(o => cb.checked ? selectedIds.add(o.id) : selectedIds.delete(o.id));
  updateBulkBar();
  renderTable();
}

function clearSelection() {
  selectedIds.clear();
  document.getElementById('selectAll').checked = false;
  updateBulkBar();
  renderTable();
}

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const n = selectedIds.size;
  if (n > 0) {
    bar.classList.remove('hidden');
    bar.classList.add('flex');
    document.getElementById('bulkCount').textContent = `${n} selected`;
  } else {
    bar.classList.add('hidden');
    bar.classList.remove('flex');
  }
}

function exportOrders() { alert('Exporting ' + filteredOrders.length + ' orders as CSV…'); }

let sortCol = -1, sortAsc = true;
function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
  const keys = [null,'id','customer',null,'amount',null,'date'];
  filteredOrders.sort((a,b) => {
    const k = keys[col];
    const av = a[k], bv = b[k];
    return (av < bv ? -1 : av > bv ? 1 : 0) * (sortAsc ? 1 : -1);
  });
  renderTable();
}

renderTable();
</script>
</body>
</html>
